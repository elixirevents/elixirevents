name: Kamal Deploy

on:
  workflow_run:
    workflows: ["All checks pass"]
    types: [completed]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: elixirevents/elixirevents

jobs:
  build:
    name: Build and push image
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Generate data sync manifest
        run: ./.kamal/hooks/pre-build

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/setup-qemu-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          labels: |
            service=elixir-events
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build
    concurrency: deploy-group

    steps:
      - uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - run: gem install kamal -v "~> 2.0"

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Write Kamal secrets
        run: |
          mkdir -p .kamal
          echo "${{ secrets.KAMAL_SECRETS }}" > .kamal/secrets

      - name: Deploy with Kamal
        run: kamal deploy --skip-push --version="${{ github.sha }}"
