name: Data Preview

on:
  pull_request:
    paths:
      - "priv/data/**/*.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    name: Preview data changes
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate preview
        id: preview
        run: |
          .github/scripts/data-preview.sh origin/main /tmp/preview.md
          if [ -s /tmp/preview.md ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            { echo "body<<EOF"; cat /tmp/preview.md; echo "EOF"; } >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post PR comment
        if: steps.preview.outputs.has_changes == 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: data-preview
          message: ${{ steps.preview.outputs.body }}
