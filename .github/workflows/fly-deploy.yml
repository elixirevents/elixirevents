name: Fly Deploy

on:
  workflow_run:
    workflows: ["All checks pass"]
    types: [completed]

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency: deploy-group
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Generate changed data manifest
        run: |
          git diff --name-only HEAD~1 -- priv/data/ | grep '\.yml$' > priv/data/.changed_files || true
          if [ -s priv/data/.changed_files ]; then
            echo "Changed data files:"
            cat priv/data/.changed_files
          else
            echo "No data files changed."
          fi

      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
