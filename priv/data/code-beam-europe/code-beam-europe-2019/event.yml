description: |
  Code BEAM STO 2019 — the Erlang and Elixir conference in Stockholm, in the home of Erlang. Two days of talks, training, and networking for the BEAM community, bringing together developers, businesses, and start-ups using the Erlang and Elixir ecosystem.

  This was the predecessor to what became Code BEAM Europe. CodeSync considers this the inaugural Code BEAM Europe edition.
