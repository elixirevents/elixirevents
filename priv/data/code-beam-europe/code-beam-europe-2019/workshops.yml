- title: "OTP for the Seasoned Erlanger"
  slug: "otp-for-the-seasoned-erlanger"
  experience_level: "Intermediate"
  language: en
  start_date: "2019-05-20"
  end_date: "2019-05-22"
  description: |
    You will learn the prevailing Erlang design patterns called OTP behaviours. We will cover Erlang design patterns such as generic behaviours, finite state machines, and event handlers. You will also learn how to develop systems using the supervisor and application behaviours, and how to package code and create release upgrades.

    **Format:** 3 days in-person training (9:00–17:00 CEST), Regus Klarabergsgatan 29, Stockholm
  trainers:
    - robertvirding
  topics:
    - erlang
    - otp

- title: "Elixir Bootcamp: From Apprentice to Alchemist"
  slug: "elixir-bootcamp-from-apprentice-to-alchemist"
  experience_level: "Beginner"
  language: en
  start_date: "2019-05-13"
  end_date: "2019-05-15"
  description: |
    A hands-on introduction to Elixir for developers coming from other programming languages.

    **Format:** 3 days in-person training (9:00–17:00 CEST), Regus Klarabergsgatan 29, Stockholm

