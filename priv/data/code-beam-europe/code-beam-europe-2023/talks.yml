- title: "Erlang Language Platform: Revolutionizing the Erlang Development Experience"
  slug: "erlang-language-platform-revolutionizing-the-erlang-developm"
  kind: talk
  level: intermediate
  language: en
  duration: 39
  abstract: |
    In this talk we unveil the ""Erlang Language Platform"" (in short ""ELP""), a groundbreaking, open-source project poised to transform the development experience for the Erlang programming language.

    Designed at WhatsApp and inspired by the success of the Rust Analyzer project, ELP is a compiler front-end for Erlang providing a scalable, fully incremental, IDE-first library for the semantic analysis of Erlang code.
    By implementing support for the LSP protocol, ELP acts as a next-generation language server, revolutionizing the way developers write, debug and maintain Erlang Code.

    In this talk we provide a high-level introduction to the project, discover what is necessary for a good interactive compiler and how it differs from more traditional compilers.
