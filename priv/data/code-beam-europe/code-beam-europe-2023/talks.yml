- title: "ChatGPT as your Erlang coach"
  slug: "chatgpt-as-your-erlang-coach"
  kind: talk
  level: beginner
  language: en
  duration: 24
  abstract: |
    With ChatGPT gaining a lot of popularity, it’s time to rethink the way to learn new concepts. More and more tutorials, projects, libraries are becoming available online and it’s hard to decide how to start.

    ChatGPT is the 24/7 mentor you need. It is good at explaining specific concepts and answering simple questions.

    We are going to learn how to use ChatGPT as a more knowledgeable friend to help us grasp the new concepts.

    Start with the key concepts in Erlang. You get a bunch of things to explore like: concurrency, message passing, pattern patching, immutable data, behaviors, supervision tree, hot code updates.

    Ask ChatGPT to create a plan with resources and a timeline to cover the Erlang concepts.

    Show the code generated by ChatGPT for several Erlang concepts and discuss the solutions.

    Use ChatGPT for finding project ideas, improving pieces of code, discovering other ways of implementing an idea.

    Show the benefits and the downsides of using ChatGPT with concrete examples.
