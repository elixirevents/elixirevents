- title: "Becoming a Stronger Developer"
  slug: "becoming-a-stronger-developer"
  kind: lightning_talk
  language: en
  duration: 6
  abstract: |
    "We get paid to sit (or stand) at a desk all day. Most of us want to be in better physical shape, but carving out a few hours per week to go to the gym can be a real challenge. My back hurt too much to do most forms of exercise. Through the book “Body by Science” I learned that it really only takes less than 15 minutes per week in the gym to build muscle and get in good physical shape. I was skeptical of this approach but gave it a try and proved for myself that it works. My back hurts less, I’m stronger than I have been since my 20’s, and I will soon be in the best shape of my life.

    My genes say I won’t be a bodybuilder, and I never wanted to be. However, maximizing my own physical strength with the optimal amount of effort has given me new energy and helps me focus on my work every day.

    I will give some highlights of the science presented in the book and a quick overview of the workout I do once per week as recommended by the book. I may also show the Phoenix LiveView app I am building to track my workouts."
