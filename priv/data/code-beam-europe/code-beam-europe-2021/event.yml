description: |
  Code BEAM V Europe 2021 — the second virtual edition of the European Erlang and Elixir conference.

  Originally planned in Stockholm where Code BEAM STO traditionally takes place, this 2021 edition continued the online-only format. Three days of talks, fireside chats, and panels for the BEAM community, with attendees joining from around the world.
