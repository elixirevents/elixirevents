description: |
  Code BEAM V 2020 — the fully virtual edition of the Erlang and Elixir conference.

  Originally planned in London where Code Mesh was set to take place, this 2020 edition pivoted to an online-only format due to the global pandemic. Two days of talks, panels, and networking for the BEAM community, with attendees joining from around the world.
