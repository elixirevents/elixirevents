- title: "Monkey, take the wheel"
  slug: "monkey-take-the-wheel"
  kind: talk
  language: en
  duration: 50
  abstract: |
    Monkey, take the wheel - Dmytro Lytovchenko - Software Engineer at

    ABSTRACT
    The talk briefly explains the Daniel Kahneman's fast and slow thinkers concept, where every person can operate in easy-going and cheap mode, making mistakes and enjoying the distractions, while harder tasks require switching to slow and expensive thinker mode where the smart decisions and judgements can be made, at the cost of getting tired real quick.
    The talk goes in detail how it is beneficial to accept your human nature, prone to errors, and instead trust your Erlang & Elixir language, available tools, and tests more than you would trust yourself.
    Letting your inner monkey drive the development and allowing it to make mistakes on the way is an acceptable and winning strategy. Highlighting the importance of human in, sometimes idealized, world of the software development, while the human is prone to errors.
