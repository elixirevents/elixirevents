- title: "OTP Training for Erlang Programmers"
  slug: "otp-training-for-erlang-programmers"
  experience_level: "Intermediate"
  language: en
  start_date: "2024-10-16"
  end_date: "2024-10-18"
  venue_slug: estrel-berlin
  description: |
    Learn how to scale your Erlang to billions. OTP is the middleware, libraries, and tools used to design and architect Erlang systems. The training covers the main principles, including process design patterns, supervisors, applications, and release handling. It will give you the ability to develop and architect Erlang systems.

    **Format:** 3 days in-person training (9:00–17:00 CEST)

    **Topics covered:**

    - Behaviours and Generic Servers
    - State Machines and Event Handlers
    - Supervisors and Applications
    - System Architecture Support Libraries
    - System Principles
