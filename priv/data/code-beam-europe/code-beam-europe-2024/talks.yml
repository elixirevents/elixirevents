- title: "AI-Driven Crime Alerts"
  slug: "ai-driven-crime-alerts"
  kind: lightning_talk
  language: en
  duration: 5
  abstract: |
    In this talk, we will explore how our crime alert application leverages cutting-edge AI and open-source tools to enhance community safety in Zagreb. The application scrapes public event data from the Zagreb police website using the Elixir library Floki and employs ChatGPT to accurately extract key information such as event addresses and types. With Google Maps and Google GeoCoder integration, we then visualize the geolocation of these events on an interactive map. We will focus on the process of refining ChatGPT prompts to improve the precision of address and event type extraction, ensuring more reliable and actionable alerts for users. Join us as we walk through our technical journey and the optimizations that made our solution both practical and effective.
