- title: "Taming 20 Million Oban Jobs in Production"
  slug: "taming-20-million-oban-jobs-in-production"
  kind: talk
  language: en
  duration: 20
  abstract: |
    What happens when a queue meant for thousands of jobs swells to 20 million—and keeps growing? In this talk, I’ll walk you through a real-world incident where our Oban queue spiraled out of control in production. We’ll dissect what led to this situation, how we investigated the root cause without halting traffic, and the changes we made to restore stability. This isn’t just a story about background jobs—it’s a practical lesson in diagnosing live systems, managing back pressure, and making safe trade-offs in production.
    As a bonus, I’ll share battle-tested design tips for building resilient systems with Oban—from queue isolation and job retries to rate-limiting and observability. Whether you’re scaling a system or preventing your own “20 million jobs” moment, these lessons will help.

    Key Takeaways:

    Strategies for debugging and resolving large-scale queue backlogs

    Practical advice for running Oban in production environments

    How to design job-processing systems that are resilient and observable

    Techniques for managing job volume, retries, and queue isolation

    Bonus tips from real-world experience designing with Oban

    Target Audience:

    Elixir developers, DevOps, and engineering leads working with or planning to adopt Oban.
  speakers:
    - karlosmid
  topics:
    - oban
    - elixir

- title: "Why We Killed Riak Search, and What We're Doing Instead"
  slug: "why-we-killed-riak-search"
  kind: talk
  language: en
  duration: 20
  abstract: |
    Riak Search was a Solr-based full-text search engine included in Riak KV. This talk is about why it wasn’t a good idea, and what we are planning to replace it. We’ll discuss the issues we found when trying to manage a Java VM from the Erlang VM, scaling issues encountered, and how people got around them. We’ll also touch on how to do searches at the moment in OpenRiak KV 3.2.5 using secondary indexes and regular expressions, and discuss the new Filters-based search in OpenRiak KV 3.4. We’ll finish with how to integrate 3rd party search engines such as OpenSearch using the TicTac reconciliation engine.

    Key Takeaways:

    Why not to use multiple VMs on the same box, how to spot when this is an issue, how OpenRiak dealt with this, and how OpenRiak brought back similar functionality in a better way

    Target Audience:

    Anyone whose code relies on a 3rd party VM such as Java
  speakers:
    - nicholasadams
    - peterclark
  topics:
    - libraries
    - erlang

- title: "Functional Domain Modeling with Gleam"
  slug: "functional-domain-modeling-with-gleam"
  kind: talk
  language: en
  duration: 20
  abstract: |
    This presentation demonstrates how Gleam’s powerful type system and functional programming paradigm excel at domain modeling within Domain-Driven Design (DDD).

    It showcases Gleam’s ability to create highly accurate domain representations through structs to represent data, union types for modeling choices, and pure functions that directly reflect business workflows.

    It also explores how Gleam’s syntax makes domain logic self-evident and accessible to non-programmers while maintaining the robustness and concurrency benefits of the BEAM for production systems.

    Key Takeaways:

    Get insights on how Gleam’s type system can be used to directly represent domain concepts and business rules, and to build complex domain behaviors by composing simple, pure functions and data structures. Understand how well-modeled functional code becomes accessible documentation for both technical and non-technical stakeholders.

    Target Audience:

    Developers already familiar with functional programming concepts and interested in Domain-Driven Design, Gleam developers looking to apply DDD principles effectively in their projects and Elixir/Erlang folks exploring Gleam in general.
  speakers:
    - eduardohernacki
  topics:
    - gleam
    - functional-programming

- title: "Adding JIT to AtomVM"
  slug: "adding-jit-to-atomvm"
  kind: talk
  language: en
  duration: 40
  abstract: |
    The just-in-time compiler was introduced at CodeBEAM V in 2020 by Lukas Larsson. It shipped with OTP-24 and succeeded HiPE in dramatically improving the speed of the BEAM.

    In this talk we will discuss how native code compilation is brought to AtomVM, the virtual machine that runs on micro-controllers and in the browser, following a slightly different approach.

    The talk will compare BEAM and AtomVM approaches to emulation. Typically, BeamASM, the JIT compiler of the BEAM, was designed with simplicity and maintenance in mind to cope with the size of OTP team. As AtomVM team is even smaller, simplicity and maintenance are also key requirements. AtomVM’s native compiler also needs to address AtomVM’s constraints such as portability to most important supported architectures (RISCV, ARM32, Xtensa, WASM) as well as compilation directly on the devices with very few amounts of RAM, as AtomVM can blink with 128 KB of RAM and run Distributed Erlang with as few as 400 KB.

    Eventually, AtomVM JIT compiler, being a 2025 project, leverages newest software engineering technologies and the talk will also cover how an LLM eventually helped with such a complex task.

    Key Takeaways:

    How execution of code in BEAM languages work
    How to software engineer a VM for microcontrollers
    How LLM can be used to compensate for developer knowledge

    Target Audience:

    Erlang, Elixir and Gleam developers curious about execution of their code
    IoT enthusiasts
  speakers:
    - paulguyot
  topics:
    - embedded
    - erlang

- title: "Erlang just got a new debugger"
  slug: "erlang-just-got-a-new-debugger"
  kind: talk
  language: en
  duration: 40
  abstract: |
    OTP 28 comes with new debugging capabilities and edb is a stepping debugger built around them. Unlike OTP’s old debugger, edb will freeze your node and let you check what all those processes are up to, with no rush.

    Is this a toy? Not at all! We use it at WhatsApp everyday and, as we will see in this talk, so can you.

    Key Takeaways:

    There’s a new debugger for Erlang (requires OTP 28)
    Works with VSCode or any major editor/IDE
    Not much is Erlang specific, shouldn’t be too hard to support other BEAM languages
    They may want to try it out

    Target Audience:

    Erlang / Elixir / Gleam developers
  speakers:
    - danielgorin
  topics:
    - observability
    - erlang

- title: "Rapidly building with Gleam"
  slug: "rapidly-building-with-gleam"
  kind: talk
  language: en
  duration: 40
  abstract: |
    iindy are a company that sends a lot of messages, we manage brand communication via WhatsApp, Instagram and more.
    Powering all these conversations is a rules engine developed in Gleam, running on BEAM infrastructure.

    Gleam gives us amazing development velocity, and we’re able to iterate on our rules engine quickly.
    The BEAM gives us a robust and scalable platform to run our rules engine on, missing user messages is not an option.

    This talk will cover how we use Gleam to build fast. We’ll discuss how the ecosystem and community makes productive development easy and natural.
    We’ll cover how it fits into the wider BEAM ecosystem, as well as covering Gleams party trick of how it fits into the frontend ecosystem.

    Key Takeaways:

    Gleam is productive. Gleam has been production ready for a long time.

    Target Audience:

    I will assume some BEAM knowledge and focus on the things available in Gleam that are not available in the other BEAM languages
