- title: "Concurrent AI Evaluation: Scaling Model Performance Monitoring with OTP"
  slug: "scaling-model-performance-monitoring-with-otp"
  kind: talk
  language: en
  duration: 20
  abstract: |
    Evaluating model performance remains a significant challenge in the rapidly evolving AI landscape. Traditional evaluation approaches often struggle with scale, consistency, and real-time feedback integration—precisely the problems that Elixir and the BEAM were designed to solve.

    We’ll explore:

    Live Benchmarking Pipelines: Implementing resilient GenServers and dynamic supervision trees that continuously process evaluation data at scale.

    Concurrent Prompt Evaluation: Building distributed worker pools that can evaluate thousands of prompt variations across multiple LLM providers.

    Systematic Human-in-the-Loop Automation: Designing resilient feedback processing pipelines using GenStage and Broadway that validate human annotations, detect inconsistent labelers, and automatically route corrections into training loops.

    LangChain.ex Integration: Implementing “LLM-as-a-judge” evaluation patterns using LangChain.ex to create sophisticated, criteria-based evaluations of AI outputs with minimal code overhead.

    This talk demonstrates why Elixir’s unique strengths make it the ideal platform for building AI evaluation systems that scale from prototype to production.

    Key Takeaways:

    This talk aims to bridge the gap between theoretical AI evaluation concepts and practical, production-ready implementations using Elixir’s unique capabilities. The audience will learn:

    How to design and implement scalable AI evaluation architectures using OTP principles

    Practical patterns for handling the inherent uncertainty in AI evaluation (timeouts, rate limits, inconsistent results)

    How to integrate human feedback loops into automated evaluation pipelines

    Working code examples using LangChain.ex and other Elixir AI libraries that they can adapt for their own projects

    Target Audience:

    Elixir developers working with AI/ML systems, AI engineers interested in scalable evaluation architectures, and teams building production LLM applications who need robust monitoring solutions.
  speakers:
    - ramiromatteoda
  topics:
    - ai
    - otp
    - elixir

- title: "Adopting Gleam the Boring Way"
  slug: "adopting-gleam-the-boring-way"
  kind: talk
  language: en
  duration: 20
  abstract: |
    You’ve learned about Gleam and are eager to use it in practice - but introducing a new language raises important questions: How will it integrate with your existing codebase? What if functionality isn’t available yet? Where does introducing Gleam even make sense?

    Good news: adopting Gleam doesn’t have to be an all-or-nothing decision! In this talk, we’ll explore practical patterns for incremental adoption: identifying low-risk “islands” for Gleam, calling Gleam from Erlang/Elixir/JavaScript, and integrating existing libraries when you need them.

    Through real-life FFI examples covering both backend integration and how to add Lustre to your frontends, you’ll leave with a toolkit for bringing Gleam to production without the big rewrite.

    Key Takeaways:

    How to identify if Gleam would be a good fit and finding the right niches
    How Gleams FFI mechanism lets you call Erlang, Elixir and Javascript functions and how to annotate them
    When to use FFI type assertions vs the dynamic/decode API
    Best practices on writing good Gleam APIs around native libraries
    Different techniques on how to integrate Gleam in existing Elixir, Erlan,g and frontend Javascript apps

    Target Audience:

    software architects and engineers evaluating tools for production systems.
  speakers:
    - yoshiereusch
  topics:
    - gleam

- title: "Fifty shades of error"
  slug: "fifty-shades-of-error"
  kind: talk
  language: en
  duration: 21
  abstract: |
    “assert” is a brand new library for Erlang, designed at WhatsApp, which enhances how Erlang errors and assertions are rendered, making it easier for developers to understand what is wrong when an error occurs.

    A drop-in replacement for Erlang/OTP stdlib’s assert macros and inspired by Elixir’s ExUnit library and the Exception behaviour, “assert” includes a structural diffing library and an exception blaming mechanism for Erlang.

    In this talk you will learn how the library can help your productivity and how to use it. We will also explore the technical implementation behind “assert”.

    “assert” is an example of how BEAM languages can influence each other, driving innovation and improvement across the whole ecosystem.

    Key Takeaways:

    Simple visual enhancements can lead to smarter debugging and more efficient development cycles
    “assert” can be a precious tool in your debugging toolbox
    BEAM languages can heavily inspire each other

    Target Audience:

    Erlang developers and enthusiasts
    Anyone who will ever write or debug an Erlang test
