    - phoenix

- title: "Building Fintech Systems That Stay Fast and Stay Compliant"
  slug: "building-fintech-systems-that-stay-fast-and-stay-compliant"
  kind: talk
  language: en
  duration: 40
  abstract: |
    Most fintech backends either grow too fast and break, or slow down to stay compliant. It doesn’t have to be either-or.

    This talk is a practical overview of how to design systems that can handle regulation, scale, and product changes at the same time. I’ll share patterns I’ve used across different fintech projects: payment flows, ledgers, orchestration, and audits.

    Some of it is low-level: typed money, trace IDs, and structured logs. Some of it is design choices: clear ownership, process boundaries, and how to support change without adding risk.

    I’ll also touch on what the BEAM makes easier in this kind of environment, and where you still have to think for yourself. No frameworks, no buzzwords. Just decisions that hold up under pressure.

    Key Takeaways:

    What a system needs to support compliance without blocking teams
    Practical patterns for ledgers, orchestration, and audit trails
    Trade-offs that show up late if you ignore them early
    Why BEAM is a strong fit for regulated infrastructure

    Target Audience:

    Developers, tech leads, and architects working on fintech systems or regulated platforms
  speakers:
    - erikstenman
  topics:
    - elixir
    - engineering

- title: "From Freakout to Fix: Navigating a Security Disaster"
  slug: "from-freakout-to-fix-navigating-a-security-disaster"
  kind: talk
  language: en
  duration: 40
  abstract: |
    Picture this: it’s late, you’re on your third coffee, and you realize your library has a serious security hole. Even worse—there’s already a public exploit. Thousands of projects are at risk, and it’s on you to fix it.

    This talk walks through how to handle that situation without melting down. We’ll cover how to file vulnerabilities, notify users, and regain control. You’ll learn about vulnerability scanners, Hex version retirement, and how a bit of prep can save you when things catch fire.

    We’ll also look at how to prevent disasters in the first place—with security policies, emergency contacts, and a healthy dose of paranoia. And most importantly: disclosure isn’t shameful. Done right, it’s leadership.

    Walk away knowing how to go from panic to patch—and maybe even feel good about it.

    Key Takeaways:

    How to respond when a public vulnerability is discovered in your code

    An understanding of how the vulnerability disclosure process works (including CVEs and Hex-specific tools)

    Concrete steps you can take today to prepare for a security incident

    Why being transparent and proactive about security is a strength, not a shame

    Target Audience:

    Anyone maintaining code that others rely on—whether it’s an open source library or a production application. If you’ve ever thought “what if I ship a bug that breaks the world?”, this talk is for you.
  speakers:
    - jonatanmannchen
  topics:
    - security
    - erlang

- title: "Bringing Gleam to Obsidian: A Minimal Plugin Journey"
  slug: "bringing-gleam-to-obsidian-a-minimal-plugin-journey"
  kind: talk
  language: en
  duration: 40
  abstract: |
    Are you curious about using Gleam, a statically typed functional language that compiles to JavaScript, outside its usual backend comfort zone? In this talk, I’ll walk you through my journey as a Gleam newcomer integrating its JavaScript target into the Obsidian plugin system. We’ll build a minimal yet practical plugin, exploring the setup, initial hurdles, and how Gleam’s type safety and functional style translate to the world of note-taking extensions. Whether you’re new to Gleam or just interested in alternative plugin development workflows, this session will share hands-on insights, lessons learned, and tips for getting started with Gleam in the Obsidian ecosystem.

    Key Takeaways:

    First-hand insights into the challenges and surprises encountered as a Gleam newcomer.

    Practical tips for setting up a development workflow that combines Gleam and Obsidian.

    Inspiration for trying out new languages and tools, even if you’re not an expert yet.

    Target Audience:

    Obsidian users and plugin authors looking for alternative development workflows.

    Anyone who enjoys learning from real-world, beginner-friendly journeys into new ecosystems.
  speakers:
