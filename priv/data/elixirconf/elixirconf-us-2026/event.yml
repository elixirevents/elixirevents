description: |
  America's Premier Elixir & Phoenix Conference.

  From beginners to experts, attendees benefit from hands-on training and thought-provoking keynotes. The community comes together to help shape Elixir's future, championing the growth and innovation of the Elixir ecosystem.

  The conference features 30+ sessions covering production war stories and scaling challenges, advanced LiveView and Phoenix techniques, security, performance, and monitoring, AI agents and machine learning, and the latest in Elixir tooling and developer experience.

  Whether participants are building their first Phoenix app or running Elixir at scale, they can find sessions that level up their game.
