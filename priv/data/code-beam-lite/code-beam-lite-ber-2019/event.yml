description: |
  Code BEAM Lite Berlin 2019 returned the German BEAM community to Berlin on 11 October 2019, this time at betahaus Neukölln. The single-track day opened with Louis Pilfold's introduction to Gleam and ranged across the BEAM's External Term Format, Credo, library design with token-based APIs, time-series databases, gRPC microservices, concurrency patterns, BEAM tracing visualisation, and a closing talk on functioning among humans by Tobias Pfeiffer, with lightning talks at the end.
