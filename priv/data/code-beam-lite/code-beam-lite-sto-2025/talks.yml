- title: "Easier Lint Authoring with Semantic Search and (...)"
  slug: "easier-lint-authoring-with-semantic-search-and"
  kind: talk
  level: intermediate
  language: en
  duration: 22
  abstract: "A Lint has two parts, identifying a problem, and possibly providing a fix. The first requires scanning the code for patterns that could contain a problematic occurrence, then checking each to see if it does. A fix involves changing the code, based on what has been found. This talk will show how using Semantic Search and Replace, a regex-like string to match Erlang syntax and extract interesting parts, all three of these steps can be simplified dramatically."
