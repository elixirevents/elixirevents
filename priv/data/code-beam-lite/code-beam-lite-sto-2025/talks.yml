- title: "Torus: PostgreSQL Search in Ecto"
  slug: "torus-postgresql-search-in-ecto"
  kind: talk
  level: intermediate
  language: en
  duration: 21
  abstract: "Search is a fundamental part of many applications, but choosing the right approach can be challenging. This talk explores different search strategies - from full-text and similarity searches to semantic and hybrid techniques. I’ll share insights from implementing these in a large-scale codebase serving millions of users, focusing on performance, relevance, and maintainability. Finally, I’ll introduce Torus, a library designed to integrate these search methods seamlessly into Ecto, making it easier to build and refine personalized search experiences within Elixir applications."
