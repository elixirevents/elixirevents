description: |
  Code BEAM Lite Berlin 2018 brought the local Erlang and Elixir community together for a single-track day of talks at the Bitcrowd office in Kreuzberg on 12 October 2018. The programme covered distribution with Firenest, Raft with Ra, garbage collection on the BEAM, property-based testing, GraphQL with Absinthe, documentation analysis with Inch, and pragmatic Elixir adoption alongside existing monoliths.
