- title: "Your monolith, Elixir and you"
  slug: "your-monolith-elixir-and-you"
  kind: talk
  level: intermediate
  language: en
  duration: 41
  abstract: |
    Elixir is great, so clearly we will all rewrite our applications in Elixir. Mostly, you can't and shouldn't do that. This talk details how Liefery's team built two new Elixir applications incrementally while integrating them with an existing Rails codebase — the tactics, lessons learned, and challenges encountered along the adoption journey.
