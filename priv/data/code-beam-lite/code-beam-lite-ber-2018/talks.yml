- title: "Erlang scales robots"
  slug: "erlang-scales-robots"
  kind: talk
  level: intermediate
  language: en
  duration: 41
  abstract: |
    Cooperative robotics is a fascinating area where lots of robots work together to achieve some (positive) common goal — rescue or exploration missions, for example. This talk explores how Erlang can address the scalability and fault-tolerance challenges of cooperative robotics, looking at existing Erlang-based projects and presenting research conducted at Bournemouth and Glasgow Universities.
  speakers:
    - nataliachechina
  topics:
