- title: "Functional APIs with GraphQL & Elixir"
  slug: "functional-apis-with-graphql-and-elixir"
  kind: talk
  level: intermediate
  language: en
  duration: 38
  abstract: |
    GraphQL is the next big thing in API development and is slowly replacing RESTful JSON APIs as a means of client-server communication. The talk explores how Elixir's Absinthe library enables GraphQL integration while demonstrating functional approaches to API design, covering key GraphQL concepts and implementation strategies.
