- title: "Getting distributed with Firenest"
  slug: "getting-distributed-with-firenest"
  kind: talk
  level: intermediate
  language: en
  duration: 31
  abstract: |
    In the Elixir world there are many great libraries for many things — ExUnit for testing, Plug for the web, Phoenix for real-time communication. When it comes to distributed systems, however, it has been a bit of a wild west, with many small competing solutions of varied quality. Firenest is an attempt to close that gap by providing high-quality, ready-made components for building distributed systems in Elixir.
  speakers:
    - michalmuskala
