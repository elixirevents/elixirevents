## Talks

- title: "Agentic Elixir"
  slug: "agentic-elixir"
  kind: talk
  level: beginner
  language: en
  duration: 30
  abstract: |
    Yeah yeah yeah agents and AI and LLMs. It’s one of those talks.

    Coding agents, for now and obviously, are changing how we write software. How do these weird machinations fare against Elixir? In this talk, I’ll explore what makes Elixir uniquely suited to agentic workflows and where it falls short.

    We’ll see why a few seconds in test suite startup time compound into minutes and hours of agent time, and a bunch more things like that. You’ll learn practical techniques for optimizing your Elixir codebase for having the best possible agentic experience (and, who knows, pleasing the agent robots in case the revolution ever comes).

    A final disclaimer: I promise I’m not an AI fanatic—it’s a tool and I just try to get decent at using that tool. And I typed that em-dash back there, it wasn’t a robot.
  speakers:
    - andrealeopardi
  topics:
    - elixir
    - ai

- title: "Redistributing Our Systems. Erlang's Enduring Lessons for Local-First"
  slug: "redistributing-our-systems"
  kind: keynote
  level: beginner
  language: en
  duration: 45
  abstract: |
    Elixir developers know metaprogramming: writing code that writes code. What if we applied the same thinking to AI prompts?

    Metaprompting is creating prompts that write and persist other prompts. Just as Elixir’s metaprogramming generates context-appropriate code, metaprompts generate context-appropriate instructions for AI assistants. This talk draws high-level comparisons between programming in Elixir and programming with Claude.

    Through examples like scout/plan/build/QA workflows, you’ll see how the same patterns that make Elixir code elegant—composition, clear responsibilities, reusable abstractions—also make AI-assisted development reliable. Learn to think about prompt engineering as a programming discipline by applying principles you already know: small focused pieces, context awareness, and generated artifacts that persist across sessions. developer joy.
  speakers:
    - robertvirding
    - brooklynzelenka
  topics:
    - erlang
    - distribution

- title: "Templating, Meta-programming, and Meta-prompting"
  slug: "templating-meta-programming-and-meta-prompting"
  kind: talk
  level: intermediate
  language: en
  duration: 30
  abstract: |
    Erlang was designed for reliability in telephone switches, but its core principles — isolated processes, message passing, “let it crash supervision — anticipated problems we’re only now grappling with at scale. Four decades later, these ideas are finding new expression in local-first software: apps that work offline, sync peer-to-peer, and put users back in control of their data.

    In this joint keynote, Robert Virding (Erlang co-creator) and Brooke Zelenka trace the intellectual lineage from telecom switches to CRDTs and capabilities. They’ll explore how Erlang’s fault-tolerance model maps onto modern challenges, distributed security, and systems that continue to work offline. The cloud promised to simplify distributed systems; instead concentrated in a handful of companies; perhaps the answers we need were hiding in a language designed for phone switches all along.
  speakers:
    - brucetate
  topics:
    - elixir
    - ai

