- title: "Let Elixir into your Home(Kit)"
  slug: "let-elixir-into-your-home-kit"
  kind: talk
  level: beginner
  language: en
  duration: 30
  abstract: |
    This talk introduces HAP, an Elixir library that allows you to add HomeKit support to Elixir applications, allowing them to be controlled directly from the native UI built into every iOS device. The HomeKit standard supports a wide variety of devices types such as lighting, HVAC control, security systems, and a great many more. HAP lets your embedded app look like any of these device types within the HomeKit ecosystem, giving you some serious UI superpowers for very little effort.

    We’ll be introducing HAP and also taking a number of diversions along the way:

    - Examples of working with low-level cryptography in Elixir
    - Useful patterns for supervising library-based processes
    - A 10000’ foot overview of hardware control in Nerves
    - Binary pattern matching for fun & profit
    - Amateur-level on-stage theatrics
  speakers:
    - mattrudel
  topics:
    - elixir
    - embedded
    - libraries

- title: "Sparking Joy - Tidying up GraphQL schemas with custom DSLs"
  slug: "sparking-joy-tidying-up-graphql-schemas-with-custom-dsls"
  kind: talk
  level: intermediate
  language: en
  duration: 30
  abstract: |
    DSLs are a common tool in programming narrow down complex concepts into digestible pieces. We often use them without thinking of them as DSLs, but chances are most Elixir codebases will interact with DSLs one way or another - Ecto, Plug, and even CSS.

    At Hiive, we’ve used GraphQL to power our frontends place since inception. Our schemas have grown organically with the business, but have also grown somewhat unwieldily. We used the power of Spark (the library that makes Ash work) to provide some opinionated guardrails, improve our error handling, tidy up our schema definitions, and improve developer joy.
  speakers:
    - nicholasgeraedts
  topics:
    - elixir

- title: "Migrating live processes with Zenoh in widely distributed network"
  slug: "migrating-live-processes-with-zenoh"
  kind: talk
  level: intermediate
  language: en
  duration: 30
  abstract: |
    It is relatively easy to migrate running Elixir/Erlang processes between BEAM VMs on an Erlang Cluster. However, configuring an Erlang cluster across a wide-area distributed environment is not necessarily straightforward. For example, NAPT is troublesome.

    Not only routers and firewalls, but also Carrier Grade NAPT (CGN), introduced by ISPs due to IPv4 address exhaustion, prevent clustering of BEAM nodes across different networks under different CGNs.

    Industrial systems often employ the Publisher/Subscriber (Pub/Sub) communication method. Using Pub/Sub enables more flexible process migration on a widely distributed network. We demonstrate that using Eclipse Zenoh for Pub/Sub communication allows flexible migration of GenServer processes.
  speakers:
    - yutakakikuchi
  topics:
    - erlang
    - distribution
