description: |
  The first-ever Code BEAM Lite Virtual ran on 3 April 2020 as a free, online-only afternoon conference at the start of the COVID-19 lockdown. The single-track programme opened with an Elixir update from José Valim and an OTP update from Kenneth Lundin, then ranged across Mint HTTP clients, Advent of Code in Erlang, game engines and Android applications on the BEAM, and a closing panel on remote and distributed working.
