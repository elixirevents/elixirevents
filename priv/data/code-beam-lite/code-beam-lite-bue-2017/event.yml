description: |
  The first Erlang & Elixir Factory Lite in Buenos Aires brought the BEAM community together for a day of workshops on June 29 and a full day of talks on June 30, 2017. The event was the predecessor of Code BEAM Lite Buenos Aires and gathered Erlang and Elixir practitioners from Argentina, Brazil, Europe, and beyond.

  Workshops were hosted at 10Pines' downtown offices on Av. Leandro N. Alem, while the conference day took place at Ciudad Cultural Konex in the Abasto neighbourhood.
