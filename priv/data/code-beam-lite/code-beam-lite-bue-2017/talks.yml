- title: "Elixir is not Ruby - From Object Oriented to Functional & Distributed Programming"
  slug: "elixir-is-not-ruby-from-object-oriented-to-functional-and-distributed-programming"
  kind: talk
  level: intermediate
  language: en
  duration: 27
  abstract: |
    Many Elixir developers come from a Ruby background, and the temptation is to think of Elixir as "Ruby on steroids" or a natural evolution of the language. Thomas argues that this framing is counterproductive and contrasts the object-oriented and functional paradigms within the context of building distributed systems.
  speakers:
