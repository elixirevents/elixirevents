- title: "Elixir Adoption at Scale: A Comprehensive Guide"
  slug: "elixir-adoption-at-scale-a-comprehensive-guide"
  kind: keynote
  language: en
  duration: 74
  abstract: |
    Bleacher Report demonstrates the fulfillment of the promises of Elixir and Phoenix at scale. This talk presents how the company improved developer productivity and system reliability while serving billions of monthly visitors, with metrics validating the traffic-handling improvements and details about transitioning Ruby developers to Elixir.
