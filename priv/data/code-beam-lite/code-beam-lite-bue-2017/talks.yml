- title: "From Sync to Async: how Elixir educated me"
  slug: "from-sync-to-async-how-elixir-educated-me"
  kind: talk
  level: intermediate
  language: en
  duration: 33
  abstract: |
    Rodrigo explores how Elixir and Erlang transformed his understanding of software engineering. The talk discusses the transition from synchronous to asynchronous programming paradigms and embracing failure as an inherent aspect of building concurrent systems, aimed at developers curious about Elixir/Erlang and the shift in mental model these languages require.
