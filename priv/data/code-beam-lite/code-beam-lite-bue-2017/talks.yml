  slug: "adts-y-otras-heuristicas-para-trabajar-mejor-con-erlang"
  kind: talk
  level: intermediate
  language: es
  duration: 44
  abstract: |
    Los Tipos Abstractos de Datos (ADTs) proveen una manera muy prolija para estructurar sistemas. En esta charla, Brujo presenta buenas prácticas para diseñar aplicaciones Erlang más mantenibles, combinando material conceptual con herramientas prácticas, con foco en simplicidad, modularidad y mantenibilidad mediante principios de programación funcional.
