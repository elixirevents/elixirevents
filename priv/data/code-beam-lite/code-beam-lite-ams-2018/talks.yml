- title: "Learn you some 'ssl' for much security!"
  slug: "learn-you-some-ssl-for-much-security"
  kind: talk
  level: intermediate
  language: en
  abstract: |
    Erlang/OTP's built-in 'ssl' application is the basis of many client and server packages, but it has its share of quirks that can lead to weak — or even broken — security. Bram walks through cipher suite selection, server hostname verification, certificate issues such as wildcard SANs, and revocation checks, with practical Erlang and Elixir examples for libraries including Ranch, Cowboy, Plug, Phoenix, and HTTP clients.
  speakers:
    - bramverburg
  topics:
    - erlang
    - elixir
    - security

