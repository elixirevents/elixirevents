- title: "Getting Erlang to talk to the outside world – in a language that they understand"
  slug: "getting-erlang-to-talk-to-the-outside-world"
  kind: talk
  level: intermediate
  language: en
  abstract: |
    Deribit's API redesign required selecting a protocol that was efficient, supported bidirectional communication, and remained accessible to non-technical users. Rather than adopting SOAP, REST, or gRPC wholesale, the team built a solution from JSON-RPC, WebSockets, OpenAPI, and OAuth — enabling them to generate documentation, build testing frameworks, and offer browser-based API exploration. A case study on how to make Erlang systems communicate effectively with the outside world.
  speakers:
    - willemdejong
  topics:
    - erlang
    - engineering
  links:
    - kind: slides
      url: "https://www.codesync.global/uploads/media/activity_slides/0001/02/17a38f91ac1035f54da17eba7413f2a75ccfb483.pdf"

- title: "The big ball of nouns"
  slug: "the-big-ball-of-nouns"
  kind: talk
  level: intermediate
  language: en
  abstract: |
    The code is not the whole story. Each piece of code has to operate on data, which tends to introduce a lot of coupling no matter the paradigm. Maciej argues that the issue stems not from code structure alone but from how data is organised and coupled throughout an application, and advocates shifting perspective toward behaviour-driven design — identifying stronger architectural boundaries, creating smaller and more isolated components, and drawing connections to Phoenix Contexts as a path to meaningful module boundaries.
  speakers:
    - maciejkaszubowski
  topics:
    - elixir
    - engineering
  links:
    - kind: slides
      url: "https://drive.google.com/open?id=1QetrmDB2y22qu3-ReNuJk0Pp91sneNjh"

- title: "What actually is the BEAM?"
  slug: "what-actually-is-the-beam"
  kind: talk
  level: intermediate
  language: en
  abstract: |
    A look at the BEAM runtime and its compiler — how they relate, what particular strengths the combination gives our code, and how we can leverage that from the applications we write every day. The talk compares the BEAM to other environments such as the JVM, the CLR, and Lua, highlighting both similarities and differences in how these systems execute code for languages like Erlang, Elixir, LFE, and Efene.
  speakers:
    - michalmuskala
  topics:
