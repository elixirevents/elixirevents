- title: "Turning Zotonic inside out — secured MQTT everywhere"
  slug: "turning-zotonic-inside-out-secured-mqtt-everywhere"
  kind: talk
  level: intermediate
  language: en
  abstract: |
    A look at how MQTT — an efficient publish/subscribe protocol — expands what Zotonic can do. The talk covers independent web workers in browsers, client–server communication channels, server model extensions, and a unified API programming model spanning IoT and web clients, with end-to-end encryption of MQTT messages enabling secure topic-based communication.
