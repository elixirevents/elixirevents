- title: "XProf 2.0 - Evolution of tracing-based investigation"
  slug: "xprof-2-evolution-of-tracing-based-investigation"
  kind: talk
  level: intermediate
  language: en
  abstract: |
    XProf was originally created to hunt down performance issues, but the second major release shifts its purpose toward being a powerful query tool for asking questions about system behaviour and getting meaningful answers immediately. The talk highlights design improvements including a split, modular architecture and a generalised command framework that lets XProf accommodate a wider range of setups and use cases.
