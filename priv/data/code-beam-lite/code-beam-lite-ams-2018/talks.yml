## Keynotes

- title: "Such great heights"
  slug: "such-great-heights"
  kind: keynote
  level: beginner
  language: en
  abstract: |
    If you don't have a hammer, nothing looks like a nail. Concurrency on the BEAM is a great fit for a lot of problems, but it is often overlooked because many of us have worked for a long time without having that hammer in our toolbox. Saša walks through a real-world case study showing how Elixir solves established problems with a novel approach, demonstrating the technical benefits of BEAM-based systems.
