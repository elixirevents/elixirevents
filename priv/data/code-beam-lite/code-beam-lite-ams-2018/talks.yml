- title: "Who Takes Out Your Trash?"
  slug: "who-takes-out-your-trash"
  kind: talk
  level: beginner
  language: en
  abstract: |
    Every program you run creates garbage, yet most developers don't need to understand the mechanics of how it gets cleaned up. Sanne demystifies garbage collection by introducing the fundamentals — reference counting, tracing, and generational algorithms — and then explains how Erlang and Elixir specifically handle memory. Deliberately accessible to developers at all experience levels.
  speakers:
    - sannekalkman
  topics:
    - erlang
    - elixir
  links:
