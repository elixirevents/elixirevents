description: |
  Code BEAM Lite Amsterdam 2018 brought the Dutch Erlang and Elixir community together at the Lloyd Hotel on 30 November 2018 for a single-track day of 13 talks, opened with a keynote by Saša Jurić and closed with a property-based testing keynote from Thomas Arts. The programme covered MQTT, garbage collection, BEAM internals, GenStage, TLS, tracing with XProf, types in Erlang, and pragmatic Mix tooling.
