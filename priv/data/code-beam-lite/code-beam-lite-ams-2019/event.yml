description: |
  Code BEAM Lite Amsterdam returned for its second edition on 28 November 2019, this time at the Volkshotel on Wibautstraat. The single-track day opened with Brooklyn Zelenka's "The Tyranny of Structurelessness" and ranged across Zotonic meta-programming, BEAM-style execution tracing, event sourcing, GenStage tokens, observability, string processing, bare-metal Erlang on GRiSP, Credo, mutability, and the BEAM in cloud-native systems.
