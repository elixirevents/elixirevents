- title: "IoT Edge Computing with bare-metal Erlang"
  slug: "iot-edge-computing-with-bare-metal-erlang"
  kind: talk
  level: intermediate
  language: en
  duration: 27
  abstract: |
    Research from the LightKone.eu project on building a framework for distributed computing across ad-hoc IoT clusters of Erlang nodes. The talk covers progress on the GRiSP embedded system, programming approaches for edge applications that operate autonomously while staying interoperable, a prototype implementation, motivations for edge computing, the open technical challenges, and strategies for Erlang-based solutions in future edge networks.
