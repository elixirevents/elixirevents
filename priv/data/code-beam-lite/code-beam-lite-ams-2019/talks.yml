- title: "The Tyranny of Structurelessness"
  slug: "the-tyranny-of-structurelessness"
  kind: talk
  language: en
  duration: 42
  abstract: |
    Dijkstra banished GOTO 50 years ago, but unstructured programming continues to lurk in the background of every module we write. This talk looks at how complexity resurfaces as software grows, asks whether the actor model's flexibility can coexist with structural clarity, and explores modern techniques and patterns — already showing up in standard libraries across other languages — for strengthening code while keeping intent and readability.
  speakers:
    - brooklynzelenka
  topics:
    - elixir
    - engineering
