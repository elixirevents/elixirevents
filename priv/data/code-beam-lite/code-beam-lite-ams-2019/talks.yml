- title: "From Legacy To Event Sourcing"
  slug: "from-legacy-to-event-sourcing"
  kind: talk
  level: intermediate
  language: en
  duration: 49
  abstract: |
    A practical look at moving from a traditional RDBMS to event sourcing on the BEAM, using Elixir's actor-based aggregates and GenServer command processing. Beyond the conceptual case for event sourcing, the talk covers the real-world obstacles teams hit afterwards — long-term storage, scaling, regulations, and the mental shift from mutations to event-driven systems — sharing setup, headaches, and homebrew solutions, with a particular eye on GDPR compliance for persistent, immutable stores.
  speakers:
    - ianluites
  topics:
    - elixir
    - engineering
