- title: "Credo: Your Team's Robot Mentor"
  slug: "credo-your-teams-robot-mentor"
  kind: talk
  level: intermediate
  language: en
  duration: 43
  abstract: |
    A look at how Credo can act as a mentoring tool rather than a gatekeeper for an Elixir team. The talk explores how to create plugins and custom checks to level up the Credo experience, how Credo's execution model works, and how Credo integrates itself into existing workflows — with the core argument that analysis tools can be perceived as digital mentors instead of "you're doing it wrong" robots.
