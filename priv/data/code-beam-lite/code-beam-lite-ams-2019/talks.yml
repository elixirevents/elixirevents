- title: "The BEAM in the Cloud Native era"
  slug: "the-beam-in-the-cloud-native-era"
  kind: talk
  language: en
  duration: 37
  abstract: |
    Modern microservice architectures often replicate features the BEAM offers out of the box using piles of bash and Go. This talk examines how Elixir and the BEAM can address common cloud-native constraints more efficiently, the resource impact of current approaches, and how Elixir can coexist with cloud-native tooling without overengineering — making the case that cloud-native computing patterns are strongly influenced by the principles of the Erlang VM, even when written in other languages.
  speakers:
    - veronicalopez
  topics:
    - elixir
    - kubernetes
