- title: "Meta-programming in Erlang: Zotonic's template- and dispatch compilers"
  slug: "meta-programming-in-erlang-zotonics-template-and-dispatch-compilers"
  kind: talk
  level: intermediate
  language: en
  duration: 25
  abstract: |
    Zotonic does just-in-time compilation of templates and dispatch rules — both compile their definitions to Erlang modules. This talk explores these reusable components, how they work, what makes them different from similar tools like ErlyDTL, and how to apply the same techniques in other projects. Aimed at intermediate-to-advanced Erlang and Elixir developers wanting to learn meta-programming or build fast templating and dispatching solutions.
  speakers:
    - marcworrell
