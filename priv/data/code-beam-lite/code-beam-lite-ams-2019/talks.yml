- title: "The Yin and Yang of Mutability"
  slug: "the-yin-and-yang-of-mutability"
  kind: talk
  language: en
  duration: 24
  abstract: |
    A look at the trade-offs between mutability and immutability on the BEAM — where Erlang and Elixir's immutable defaults shine, and where the language and runtime quietly let mutable state in via processes, ETS, and dictionaries. A short talk on the engineering tensions that come with each choice.
