- title: "BEAM-style Execution Tracing for Perl"
  slug: "beam-style-execution-tracing-for-perl"
  kind: talk
  language: en
  duration: 23
  abstract: |
    A look at how the BEAM implements execution tracing as dynamic instrumentation to address production debugging challenges, and what it would take to port the same idea to traditional language runtimes like Perl. Rather than relying on static logging that creates instrumentation debt, the talk shows how the BEAM's approach differs and why dynamic instrumentation is a key strategy for building more operable systems.
  speakers:
    - bentyler
  topics:
    - erlang
    - observability
