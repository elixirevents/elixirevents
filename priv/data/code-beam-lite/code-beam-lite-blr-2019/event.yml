description: |
  Code BEAM Lite India 2019 returned to Bengaluru on 14 November 2019, with a small lineup of five speakers at the ITC Welcomhotel on Richmond Road. The programme covered library design with Andrea Leopardi, live-coding LiveView with Bruce Tate, building a MySQL driver in Elixir, and experience reports on adopting Erlang at Redbus and on the BEAM's failure-handling philosophy.
