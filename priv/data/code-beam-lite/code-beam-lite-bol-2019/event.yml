description: |
  Code BEAM Lite Italy 2019 brought the Italian Erlang and Elixir community together at the Consorzio T3LAB in Bologna on 22 March 2019. The single-track day opened with Saša Jurić's keynote "Such great heights" and closed with Andrea Leopardi's "Elixir Architecture 101", with talks on AtomVM, wxErlang, Scenic, GenStage and OTP, CRDTs, the Diameter protocol, the Erlang Ecosystem Foundation, and live coding with TDD.
