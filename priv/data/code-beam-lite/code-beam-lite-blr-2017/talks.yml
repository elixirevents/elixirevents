- title: "Elixir by the Bellyful"
  slug: "elixir-by-the-bellyful"
  kind: keynote
  language: en
  duration: 48
  abstract: |
    Elixir makes me happy, and I bet it will make you happy too. OK, but why is that? Elixir is a modern functional programming language with productive "dev joy" tooling, and it sits atop a decades-stable, crazy-scale, battle-tested foundation: the Erlang VM and OTP.
