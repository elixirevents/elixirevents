- title: "Pilgrim's Progress to the Promised Land"
  slug: "pilgrims-progress-to-the-promised-land"
  kind: keynote
  language: en
  duration: 39
  abstract: |
    When migrating to Elixir/OTP from other languages and systems a number of issues will always crop up. The trick is to make sure these issues don't become problems. This talk looks at some of the more common ones and what to do about them so they don't.
