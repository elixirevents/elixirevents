description: |
  The first Erlang & Elixir Factory Lite in India brought the BEAM community together in Bengaluru on November 17, 2017 — the predecessor of Code BEAM Lite India. The single-day, two-track conference at Fortune Park JP Celestial featured keynotes from Francesco Cesarini, Bryan Hunter, and Robert Virding alongside talks from Indian and international Erlang/Elixir practitioners on topics ranging from rebar3 and GenStage to umbrella apps, benchmarking, and concurrent event processing.
