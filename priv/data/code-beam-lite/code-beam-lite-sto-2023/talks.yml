- title: "Building Erlang with Buck2"
  slug: "building-erlang-with-buck2"
  kind: talk
  level: beginner
  language: en
  duration: 27
  abstract: |
    Buck2 is Meta's next generation large-scale build tool used to build most code within Meta. WhatsApp developed and open-sourced the Erlang rules that are used to build the services that provide private messaging for over 2 billion users. In this talk we talk Buck2, and the advantages it provides for us building millions of lines of Erlang code. We will talk about what type of projects can benefit from using Buck2, and finally, we will also talk about how to make use of the rules in your own project.

    Audience: maintainers and integrators of large Erlang code-bases, and people interested in large-scale build tools.
