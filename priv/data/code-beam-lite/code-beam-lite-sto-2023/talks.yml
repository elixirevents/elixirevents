## Keynotes

- title: "How to Sell Elixir (Again)"
  slug: "how-to-sell-elixir-again"
  kind: keynote
  level: beginner
  language: en
  duration: 49
  abstract: |
    We have celebrated 10 years of Elixir and also nearly 25 years of Erlang since the open source release in December 1998. Most of the libraries that were needed to make the ecosystem viable have been built, talks given, books written, conferences held and training sessions provided. A new generation of companies have been built on top of the Elixir / Erlang ecosystem. In all measures, we have achieved further reach and maturity than 5 years ago.

    In the session, Evadne will revisit the topic of Elixir adoption, and discuss the following topics, based on her personal ideas, beliefs, and experience: migrating and managing Erlang & Elixir workloads, designing B2B / B2C systems that leverage the ecosystem's capabilities, and ensuring continued evolution of the team, the organisation and the ecosystem.
  speakers:
    - evadnewu
  topics:
