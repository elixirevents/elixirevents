- title: "Learning about Supervisors using Phoenix LiveView"
  slug: "learning-about-supervisors-using-phoenix-liveview"
  kind: talk
  level: beginner
  language: en
  duration: 14
  abstract: |
    Understanding processes and supervisors in Erlang/Elixir can be tricky for beginners. When I was preparing to give a talk introducing Erlang and Elixir to developers in Vietnam, I thought of this idea to visualise how processes and supervisors work using Phoenix LiveView. A simple application was written and people were impressed by the power of OTP. It was a waste to just have it as a one-time demo, and I thought it could be helpful — if you are a visual learner, with some quick setup, clicking and playing around, the demo can help beginners to understand more about processes and supervisors.

    Audience: beginners learning about Erlang processes, and trainers wanting to show their class how supervisors work.
