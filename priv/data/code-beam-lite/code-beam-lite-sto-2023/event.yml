description: |
  Code BEAM Lite Stockholm 2023 returned to the Swedish capital on 12 May 2023, hosted at 7A Posthuset on Vasagatan. The single-track day mixed three keynotes — Evadne Wu on selling Elixir, Peter Van Roy on building large systems, and Sam Aaron on Sonic Pi — with talks on Buck2 builds at WhatsApp, eqWAlizer, Mria, AtomVM/Evision computer vision, GenStage, NIFs in Zig, reversible debugging, and a Phoenix LiveView visualisation of Elixir supervisors.
