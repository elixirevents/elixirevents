- title: "From custom tests to common test"
  slug: "from-custom-tests-to-common-test"
  kind: talk
  level: intermediate
  language: en
  duration: 31
  abstract: |
    A look at modernising Riak's testing infrastructure by replacing a problematic custom test runner with the standard Common Test framework — a Google Summer of Code project carried out as a group of previous Riak users and developers stepped up to help move the database forward after Basho's closure. Along the way, the talk shares how Erlang and Elixir companies can use Google Summer of Code as both a resource and a way to help newcomers overcome the language's learning curve.
