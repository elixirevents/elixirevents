- title: "Barrel, keep your data in sync in your Erlang application"
  slug: "barrel-keep-your-data-in-sync-in-your-erlang-application"
  kind: talk
  level: intermediate
  language: en
  abstract: |
    Barrel is a database written in Erlang that runs embedded inside applications or standalone over HTTP. With Barrel you can easily bring and keep a view — complete or partial — of your data inside your application and replicate it across machines. The talk demonstrates mixing local and remote storage with peer-to-peer replication strategies for building custom data platforms.
  speakers:
    - benoitchesneau
  topics:
    - erlang
    - distribution

