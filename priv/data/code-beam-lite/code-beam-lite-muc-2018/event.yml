description: |
  Code BEAM Lite Munich 2018 took place at the Sheraton München Westpark Hotel on 7 December 2018, with a free day of GRiSP training the day before. The single-track conference opened with Jane Walerud's keynote on building startups in Erlang and Elixir and covered BEAM memory management, GRiSP, Common Test, Barrel, the history of Elixir, AntidoteDB, fault tolerance, and property-based testing of smart contracts.
