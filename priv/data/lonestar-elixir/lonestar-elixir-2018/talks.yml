- title: "Keynote: Aaron Patterson"
  slug: "keynote-aaron-patterson"
  kind: keynote
  language: en
  duration: 47
  abstract: Aaron Patterson is a member of the Ruby and Ruby on Rails core teams. He has spent years working on the Ruby interpreter and is an expert in its internals. Recently, he has been exploring Elixir and the BEAM. In this talk, Aaron will share his experiences learning Elixir from the perspective of a seasoned Ruby developer. He will discuss what he finds exciting about the language, the challenges he faced, and how his background in Ruby influences his view of Elixir's concurrency and performance models.
