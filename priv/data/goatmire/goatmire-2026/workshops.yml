- title: "Upcycling Smartphones with Nerves"
  slug: "workshop-upcycling-smartphones-nerves"
  experience_level: "Intermediate"
  language: en
  start_date: "2026-09-29"
  end_date: "2026-09-29"
  venue_slug: campus-varberg
  description: |
    In this groundbreaking workshop every participant will get an Android phone running Nerves. The session is focused on a shared effort to hack new functionality into the firmware project and learn some stuff along the way.

    Run by Marc Lainez, who presented on the Nerves Car at Goatmire last year, you'll be in good hands as you explore what we can do with this device. Most IoT devices are lower end hardware with limited peripherals and capabilities. Smartphones are the exact opposite — they contain every capability under the sun and a battery at that.

    In the end you'll have a custom device that lets you develop on it in Elixir that we all duly saved from the landfill.

    Requirements: install an Elixir working environment and the Nerves tooling.
  target_audience: "Elixir developers interested in Nerves and embedded systems."
  booking_url: "https://goatbiz.fly.dev/workshops/browse"
  trainers:
    - marclainez
  topics:
    - elixir
    - nerves
