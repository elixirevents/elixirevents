description: |
  Code BEAM America 2025 — the Erlang and Elixir conference in San Francisco at the Marines' Memorial Club & Hotel, with a hybrid online + in-person format. Two days of talks across two tracks (Crystal Ballroom and Crystal Lounge on the 11th floor) covering LLMs and AI, fault-tolerant ML ops, Nerves, Ash, Gleam, distributed systems, and the socio-technical elements of good platforms.
