  - title: "Livebook Meets GRiSP: Pushing IoT from Cloud to Edge, One Notebook at a Time"
    slug: "livebook-meets-grisp-pushing-iot-from-cloud-to-edge-one-notebook-at-a-time"
    kind: talk
    language: en
    duration: 41
