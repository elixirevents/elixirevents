description: |
  Code BEAM SF 2018 — the only conference in the USA bringing all the languages that run on the BEAM together, including Erlang and Elixir. Two days of talks across three tracks (Crystal Ballroom, Crystal Lounge, Regimental) at the Marines' Memorial Club & Hotel in San Francisco's Union Square. Notable for Joe Armstrong's keynote on "The Forgotten Ideas in Computer Science".
