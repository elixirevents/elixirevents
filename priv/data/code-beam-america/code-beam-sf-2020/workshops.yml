- title: "The BEAM VM under the hood"
  slug: "the-beam-vm-under-the-hood"
  experience_level: "Advanced"
  language: en
  start_date: "2020-03-04"
  end_date: "2020-03-04"
  venue_slug: hyatt-centric-fishermans-wharf
  description: |
    Everything you wanted to know about the BEAM but were afraid to ask. Through examples and hands-on exercises, learn how to manage the BEAM VM in operational environments, optimizing for memory utilisation and performance when using Erlang or Elixir.

