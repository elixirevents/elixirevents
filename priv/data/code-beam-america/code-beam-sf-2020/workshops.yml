- title: "OTP for the seasoned Erlanger"
  slug: "otp-for-the-seasoned-erlanger"
  experience_level: "Advanced"
  language: en
  start_date: "2020-03-02"
  end_date: "2020-03-04"
  venue_slug: hyatt-centric-fishermans-wharf
  description: |
    Learn the prevailing Erlang design patterns called OTP behaviours. Covers generic behaviours, finite state machines, event handlers, and the supervisor and application behaviours patterns, so you can construct maintainable and fault tolerant software. Upon completion of this course, you'll be able to extend it all by devising your very own behaviours.

    **Format:** 3 day training (09:00–17:00 PT)

    Course outline: behaviours, generic servers, finite state machines, supervisors, event handlers, and structuring large Erlang-based systems.
  trainers:
    - robertvirding
  topics:
    - erlang
    - otp
    - concurrency

- title: "OTP behaviours: Behind the scenes"
  slug: "otp-behaviours-behind-the-scenes"
  experience_level: "Intermediate"
  language: en
  start_date: "2020-03-02"
  end_date: "2020-03-04"
  venue_slug: hyatt-centric-fishermans-wharf
  description: |
    Hands-on training for Phoenix/Ecto developers ready to progress to the next level. Focuses on building applications using OTP behaviours and architecture guidelines.

    **Format:** 3 day training (09:00–17:00 PT)

    Topics: life before OTP, OTP architecture, behaviours, supervision, GenServer, GenStateMachine, GenStage, GenFlow, event handlers, optimizing for performance, ETS, and load regulation/back-pressure (fuse, safety valve).
  trainers:
    - manuelrubio
  topics:
    - elixir
    - otp
    - phoenix

- title: "Introductory Phoenix LiveView: web development without JavaScript"
  slug: "introductory-phoenix-liveview-web-development-without-javascript"
  experience_level: "Intermediate"
  language: en
  start_date: "2020-03-04"
  end_date: "2020-03-04"
  venue_slug: hyatt-centric-fishermans-wharf
  description: |
    Build highly interactive web applications using Phoenix LiveView. Instead of coding JavaScript to move data between the client and server, rely on the power of Phoenix and Elixir to do the hard work for you.

    **Format:** 1 day tutorial (09:00–17:00 PT)

    Course outline: the LiveView lifecycle, building pages online and in templates, sending events with HTML, building back-end models, and building software in layers.
