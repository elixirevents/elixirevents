description: |
  Code BEAM SF 2020 — the American Erlang and Elixir conference held in San Francisco at the Hyatt Centric Fisherman's Wharf. Two days of talks, panels, and networking for the BEAM community, with a packed schedule across three tracks (OK BEAMer, Gen X, BEAMenial) covering everything from OTP and embedded systems to LiveView, Kubernetes, and machine learning on the BEAM.
