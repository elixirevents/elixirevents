description: |
  Code BEAM America 2022 — the Erlang and Elixir conference returning in-person at the Computer History Museum in Mountain View, with a hybrid online + on-site format. Two days of talks across two tracks (Hahn Auditorium and Grand Hall) covering Nx, Nerves, LiveView, distributed Erlang, formal verification, and the future of the BEAM ecosystem.
