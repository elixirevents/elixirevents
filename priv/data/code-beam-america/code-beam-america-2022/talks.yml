  - title: "How Elixir Helped Me to Love the Back-End"
    slug: "how-elixir-helped-me-to-love-the-back-end"
    kind: talk
    language: en
    duration: 45
    level: beginner
    abstract: |
      As someone whose main language was Javascript, I used to dread the backend. I would create the bare minimum and then set my focus on the frontend. Now that I use Elixir, however, I love working in the backend. This talk focuses on how Elixir makes the backend easy and intuitive and much less intimidating for anyone who shied away from the backend before.
    speakers:
      - katelynnburns

  - title: "An Elixir application to a small hydropower plant with Nerves machines"
    slug: "an-elixir-application-to-a-small-hydropower-plant-with-nerves-machines"
    kind: talk
    language: en
    duration: 45
    level: intermediate
    abstract: |
      We have been working on developing small hydropower plants in regional areas in Japan. They have two subsystems, one controlling the plant and the other communicating with a management system on the internet. The latter subsystem, we call SCADA, or Supervisory Control And Data Acquisition.
      We often use PLCs, or Programmable Logic Controllers, that are industrial computers for the former subsystem. However, PLCs are unsuitable for SCADA because they are too traditional to be a part of a distributed system like SCADA. Therefore we have been trying to use a modern method for it.
      This time, we produce our own machine running Nerves, an extension of BeagleBone Green. Also, we made a program in Elixir to communicate the management system in the cloud. This presentation will report the system that Elixir uses in an industrial field. Also, we will discuss the issue in the domain that we should consider.
    speakers:
      - yutakakikuchi

  - title: "Learn you some pattern matching for great good!"
    slug: "learn-you-some-pattern-matching-for-great-good"
    kind: talk
    language: en
    duration: 45
    level: beginner
    abstract: |
      Move `if` to the bottom of your toolbox. Have you ever looked at a function with numerous conditionals buried within and thought "there has to be a better way"? Well, there is! It's pattern matching!

      This talk will focus on the basics of pattern matching, both how pattern matching works and why we might want to use it to simplify our code structure.

      First, we will walk through an example of a simple pattern match and take a look at how these concepts can be applied in a larger codebase.

      Then we will refactor by taking a look at a function that utilizes multiple conditionals and walk through how to implement pattern matching in a step by step process. We'll also discuss why refactoring to pattern matching can improve codebases.

      Lastly, we'll discuss the pros and cons of utilizing pattern matching in different situations you might see in a large codebase. By the end of this talk, you'll have added pattern matching to your toolbox to wield with confidence.
    speakers:
      - elaynejuten

  - title: "RabbitMQ Performance Improvements"
    slug: "rabbitmq-performance-improvements"
    kind: talk
    language: en
    duration: 45
    level: intermediate
    abstract: |
      This talk starts by providing an overview of RabbitMQ's architecture. Michal and David explain how the Erlang Runtime System is leveraged to implement a scalable message broker.

      We discuss performance improvements in recent RabbitMQ releases for all queue types: Classic Queues, Quorum Queues, and Streams.
      We provide examples of how we spotted and fixed bottlenecks in the broker thanks to new Erlang/OTP features.
      Current performance shortcomings are also addressed in the presentation.

      The talk concludes with an outlook of RabbitMQ's future direction and what the community can expect from RabbitMQ in 2023.
    speakers:
      - davidansari

  - title: "Freestanding Erlang: Porting BEAM close to the metal"
    slug: "freestanding-erlang-porting-beam-close-to-the-metal"
    kind: talk
    language: en
    duration: 25
    level: intermediate
    abstract: |
      Erlang and Elixir are great languages for programming concurrent and fault-tolerant applications yet they still require BEAM to run them on real-world hardware. BEAM is a complex piece of software that leverages general purpose operating systems to enable concurrent applications to scale to incredible levels.

      But what if you want to run Erlang or Elixir without an OS? Modern operating systems such as Linux are large and complex and can be the wrong choice to deploy on for embedded applications that prioritize security and robustness.

      What would it take to run the open source BEAM implementation in a freestanding environment with no external OS services but still presented a partial POSIX system interface? Would this implementation still allow for useful applications? What are the tradeoffs and what features do we need to give up? This talk tries to answer these questions by presenting a recent project that ported BEAM to a freestanding environment for ARMv7 application processors.
    speakers:
      - kentmcleod
      - ihorkuz

  - title: "Typing with pixie dust"
    slug: "typing-with-pixie-dust"
    kind: talk
    language: en
    duration: 25
    level: beginner
    abstract: |
      Legacy code. It can be...fragile. It really helps if you can already be sure what types your functions expect and return, but what if past-you didn't include type specs, making life harder for now-you?

      Thankfully, TypEr already exists, but what if we could sprinkle on some pixie dust and make it more automagic? There's a Rebar3 plugin for that! Come learn about the tools used to create that plugin, discoveries along the way, and enhancements made to TypEr in the process.
    speakers:
      - mackenziemorgan

  - title: "Diving In: a case study of using FP and Erlang in a Computer Science Curriculum"
    slug: "diving-in-a-case-study-of-using-fp-and-erlang-in-a-computer-science-curriculum"
    kind: talk
    language: en
    duration: 45
    level: beginner
    abstract: |
      Change can be hard, especially when everyone has input but not detailed experience. At BYU-Idaho we faced an outdated CS undergraduate curriculum that did not meet Higher Education or industry, and therefore student, needs. In a dramatic and complete rewrite of our CS curriculum, Functional Programming and Erlang became a large part of the solution to our problem.
    speakers:
      - leebarney

  - title: "Comparing Elixir and Python when working with Simple Neural Networks"
    slug: "comparing-elixir-and-python-when-working-with-simple-neural-networks"
    kind: talk
    language: en
    duration: 45
    level: beginner
    abstract: |
      With a wide range of libraries focused on the machine learning market, such as TensorFlow, NumPy, Pandas, Keras, and others, Python has made a name for itself as one of the main programming languages. In February 2021, José Valim and Sean Moriarity published the first version of Numerical Elixir (Nx), a library for tensor operations written in Elixir. Nx aims to allow the language to be a good choice for GPU-intensive operations.

       This talk aims to compare Python and Elixir when training convolutional neural networks using MNIST and CIFAR-10 datasets as examples, analyzing development experience, and performance difference.
    speakers:
      - lucastavano
      - adolfoneto

  - title: "OTP Process Abstractions with proc_lib"
    slug: "otp-process-abstractions-with-proc-lib"
    kind: talk
    language: en
    duration: 45
    level: intermediate
    abstract: |
      Creating your own generic process abstraction can allow developers to focus on their implementation and not worry about boilerplate. Examples of this exist in OTP with `gen_server`, in Elixir's Task, and in libraries like Phoenix with Channels.

      Using `proc_lib`, you can quickly create your own process abstractions that are OTP-compliant: they're able to be supervised, respond to debugging tools like `sys:get_state/1`, and have their own custom callbacks (`handle_foo`). This is how `gen_server` and `gen_statem` are implemented.

      In this talk, we'll explore all the different features that you've seen in OTP-compliant processes, what we might want in our own, and hypothesize what it takes to build one. We'll take this hypothesis and walk through building an abstraction for making custom language servers using the Language Server Protocol.

      In the end, we'll see that in just a few lines of code, we can easily build our own OTP-compliant process abstraction and use it to build a process.
    speakers:
      - mitchellhanberg

  - title: "Better Data Access with Composable Queries"
    slug: "better-data-access-with-composable-queries"
    kind: talk
    language: en
    duration: 45
    level: beginner
    abstract: |
      The Ecto.Query DSL gives us a wonderfully expressive tool for fetching data. With a little bit of extra magic, we can create composable, human-readable, expressive, pipeline-able methods that reveal the human meaning behind the data we're accessing, rather than the implementation details of the DB schema itself.

      In this talk, I'll show how to begin decomposing existing queries (and creating new queries) with composable queries, how to organize those queries, and how to make them discoverable. I'll also show how to accomplish common joins, make use of subqueries, and other common SQL operations.
    speakers:
      - andrewek

  - title: "Crossing boundaries with Gleam - from functions to runtime."
    slug: "crossing-boundaries-with-gleam-from-functions-to-runtime"
    kind: talk
    language: en
    duration: 25
    level: intermediate
    abstract: |
      As BEAM programming languages go, Gleam is a rising star that mantains the same capabilities we love from the platform but adds a slightly different route for constructing programs.

      Gleam relies on type signatures and a friendly compiler that can very quickly detect some flaws in our logic. In some scenarios it will help with simple casting errors, but in others the type signatures can guide the design of our programs.

      In this talk I would like to take a tabletop game and explore its implementation in Gleam, showing some of the bits and building blocks of the language plus different approaches of doing abstraction through types.

      More so, once our core logic is defined we can start thinking on how it can be integrated to the BEAM runtime and how crossing this boundary looks like.
    speakers:
      - raulchouza

  - title: "High throughput data processing with GenStage"
    slug: "high-throughput-data-processing-with-genstage"
    kind: talk
    language: en
    duration: 25
    level: intermediate
    abstract: |
      Data processing is a part of many disciplines in technology and as the amount of data you need to process grows so do the techniques you need to be able to safely and speedily ingest that data. Join us as we go through the building blocks Elixir offers to build different ingestion topologies that handle things like backpressure, partitioning, retries, and batching.
    speakers:
      - ianbutler

  - title: "Nerves in a Cloud World"
    slug: "nerves-in-a-cloud-world"
    kind: talk
    language: en
    duration: 25
    level: beginner
    abstract: |
      Nerves is an amazing project that allows you to run your Elixir projects on embedded devices. But did you know that your Nerves projects can escape the confines of hardware and live in the ethereal cloud? Yes, it’s true! I've been running a "production" Nerves project in the cloud for over a year and now. Although we know this is not the point of Nerves, it is fun to push the boundaries of Nerves and see what it can bring to novel situations. Join me in this talk to learn how to run Nerves in the cloud and what niche applications might benefit from such a set-up.
    speakers:
      - jasonaxelson

  - title: "Barrel, a decentralized data platform to take back the control of your data"
    slug: "barrel-a-decentralized-data-platform-to-take-back-the-control-of-your-data"
    kind: talk
    language: en
    duration: 25
    level: intermediate
    abstract: |
      Along the years have built and provided to our customers a moderne decentralized platform which next iteration will be fully opensource. With barrel you can easily pass, filter and control the data between on-premise or cloud sites using a Peer-To-Peer network built over HTTP and other web technologies like WASM. You can also subscribe to different data stream using using AQMP, MQTT, Websockets, Server-Sent-Events.

      The data is always under your control and sites even when using our service hosted in different datacenters in our own hardware.

      With barrel we created and continue to maintain different opensource libraries and projects used by the Erlang Ecosystem: rocksbd binding, hackney, erlang nat, certifi... .. In this talk we will show how to use Barrel and its core opensource foundations in your own projects, why we build it in Erlang and how w' expect to maintain this opensource product and the different libraries we have built along the years
    speakers:
      - benoitchesneau

  - title: "Keynote: Security Under the BEAM"
    slug: "keynote-security-under-the-beam"
    kind: talk
    language: en
    duration: 32
    level: beginner
    abstract: |
      The BEAM VM is a leader in application-level isolation. Isolated code recovers from faults. Isolated processes can process messages asynchronously with very little coordination. Isolated data means garbage collection is fast and simple. We studied these isolation patterns and asked what would an operating system look like that learned from those lessons and was built to be good at running the BEAM? Could isolation patterns be used to provide deep security that runs from the OS up through the BEAM? The resounding answer to that question is yes! In this keynote, we will present our findings and show you how to build software that uses trustworthy isolation, so that if problems do occur, they cannot spread to the rest of the system. The combination of formal methods, the seL4 Microkernel and the BEAM is the magic formula to build a new operation system for the next generation of software and device. We are very excited to present, for the first time, the Kry10 Secure Platform.
