description: |
  Code BEAM America 2021 — the second American virtual edition of the Erlang and Elixir conference.

  Originally planned in San Francisco where Code BEAM SF traditionally takes place, this 2021 edition continued the online-only format. Three half-days of talks, fireside chats, and panels for the BEAM community, with attendees joining from around the world.
