description: |
  Code BEAM V America 2021 — the first American virtual edition of the Erlang and Elixir conference for 2021.

  Originally planned in San Francisco where Code BEAM SF traditionally takes place, this March 2021 edition continued the online-only format. Three half-days of talks, fireside chats, and panels for the BEAM community, with attendees joining from around the world.
