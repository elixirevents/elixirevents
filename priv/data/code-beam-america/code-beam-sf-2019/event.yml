description: |
  Code BEAM SF 2019 — the American Erlang and Elixir conference held in San Francisco at the Hyatt Centric Fisherman's Wharf. Two days of talks across three tracks (OK BEAMer, Gen X, BEAMenial) covering OTP, BEAM internals, distributed systems, frameworks, and case studies. Notable for the launch announcement of the Erlang Ecosystem Foundation and José Valim's Broadway keynote.
