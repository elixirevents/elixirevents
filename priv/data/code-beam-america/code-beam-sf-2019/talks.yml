        url: "https://www.youtube.com/watch?v=KrwhOkiifQ8"

  - title: "A distributed Elixir / Phoenix application for force scanning: How we built it and what we've learned"
    slug: "a-distributed-elixir-phoenix-application-for-force-scanning-how-we-built-it-and-what-we-ve-learned"
    kind: talk
    language: en
    duration: 45
    abstract: |
      Sparta's force scanning software uses a force plate to compute metrics that are used for predicting the risk of injury.

      Our scanning application consists of a cloud-hosted Elixir/Phoenix app together with over a hundred laptops around the world, each of which is connected to a force plate, runs its own Phoenix app, and "talks" to the main web application via Channels.

      Channels are leveraged extensively to transmit live scan info, force data, and commands in real time. The technical challenges of building and maintaining such a distributed application are described, and there will also be a live demo.

      OBJECTIVES

      The talk aims to describe Sparta's software architecture at a high level, along with the lessons learned.

      TARGET AUDIENCE

      People looking for a novel application of Phoenix Channels
      People interested in sports or wellness
      Agile development teams transitioning from Rails to Elixir/Phoenix
    speakers:
      - gregwoodward
    topics:
      - elixir
      - phoenix

  - title: "Modeling and verifying distributed applications with Concuerror"
    slug: "modeling-and-verifying-distributed-applications-with-concuerror"
    kind: talk
    language: en
    duration: 45
    abstract: |
      Sometimes, a developer needs to build some algorithm using Erlang's primitives directly. Such code is usually hard to get right, as one needs to think from scratch about all the possible race conditions, timeouts, deadlocks etc. Recently, developers at Klarna decided to re-design such a custom algorithm, used in a critical component of their software stack. How could they be certain that their code would not suffer from such concurrency errors?

      Concuerror is a tool built to answer exactly such questions, but Klarna's algorithm was intimately tied to distributed Erlang's behaviors, which Concuerror does not support. The solution was to design a modelling library, vnet, which can help to simulate distributed Erlang systems on a single node.

      In this talk, Stavros will present vnet's capabilities, show how it can be used to model, test and verify distributed Erlang systems, and demonstrate the kinds of errors that Concuerror can find (or prove that don't exist!).

      OBJECTIVES

      Demonstrate new capabilities for testing and verifying distributed Erlang systems
      Report on what's going on with Concuerror, an advanced tool for testing Erlang programs

      TARGET AUDIENCE

      Distributed system architects
      People who like to play with tools
      Erlang distribution experts
    speakers:
      - stavrosaronis
    topics:
      - erlang
      - testing

