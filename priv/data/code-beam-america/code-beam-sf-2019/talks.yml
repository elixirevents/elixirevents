  - title: "BEAM Extreme; Don't try this at home!"
    slug: "beam-extreme-don-t-try-this-at-home"
    kind: talk
    language: en
    duration: 45
    abstract: |
      Who can't use an extra performance boost now than then? This talk collects a set of outrageous stunts and maybe-controversial defying acts I have seen and sometimes made in production, that can give the Erlang Virtual Machine that extra speed or memory edge on different scenarios.

      Warning! Don't copy-paste these at home like if they came straight from Stack Overflow, with great power comes great responsibility.

      OBJECTIVES

      In most cases, clarity of expression should be the principle, but sometimes you are writing a heavily used component that could use a boost of performance. This will teach the audience some controversial tricks that can be used in these edge scenarios.

      TARGET AUDIENCE

      People who want to know some weird programming hacks to get some performance gains.
    speakers:
      - miriampena
    topics:
      - erlang

  - title: "Building high performance modularization architecture in short messaging systems"
    slug: "building-high-performance-modularization-architecture-in-short-messaging-systems"
    kind: talk
    language: en
    duration: 45
    abstract: |
      For 16+ years global telcos have relied on Wavenet to deliver mission-critical messaging infrastructure scaling to billions of messages on a daily basis. Using a case study, Wavenet will discuss how powerful Erlang concepts can be used to develop a robust/scalable messaging platform that's evolved from legacy SMS to next-generation messaging in all IP architecture supporting guarantees of 5-9s availability in current & future networks with a cloud-native, extensible architecture supporting advanced deployment methodologies such as NFV & IPSM

      OBJECTIVES

      The objective is to use Wavenet's 16+ years of knowledge and expertise to offer Code BEAM audiences, best-practices in using Erlang in the design development and deployments of software solutions and infrastructure systems, and especially in Future Network environments such as NFV. The case study will show how Erlang developers can add value by offering multiple benefits mentioned under the abstract when coding with Erlang.

      TARGET AUDIENCE

      Anyone interested in using Erlang in the design development and deployments of software solutions and infrastructure systems, especially in Future Network environments such as NFV.
    speakers:
      - nuwanwijerathne
    topics:
      - erlang

  - title: "Erlang logging for the 21st OTP"
    slug: "erlang-logging-for-the-21st-otp"
    kind: talk
    language: en
    duration: 45
    abstract: |
      In 2011, Andrew released lager and in 2012 he gave a talk at Erlang Factory SF explaining why he wrote it and comparing it to all the alternatives available at the time. A lot has changed since; most of the old competitors to lager have fallen out of usage, Elixir now exists and has its own logger and now, with OTP 21, Erlang finally has a new logger in the standard library. This talk will revisit the Erlang logging scene and compare all the modern alternatives.

