description: |
  The EEF is organizing a day of community driven talks, discussions, and workshops the day before ElixirConf EU. Featuring an Elixir Unconference, a Nerves workshop with Nerves Starter Kit prototypes to experiment with, and a GRiSP workshop with hands-on hardware.

  Prior to the date, a topic submission window will open for participants with three formats: Teach, Discuss, and Learn. The Nerves core team will bring embedded hardware, half-baked software and an issue tracker full of hopes and dreams. The GRiSP workshop will feature GRiSP2 boards, PMODs, GRiSP nano prototype boards, and hardware from the Eustaquia project.
