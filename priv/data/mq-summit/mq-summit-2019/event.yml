description: |
  The second RabbitMQ Summit brought together RabbitMQ users and developers from around the world at the ILEC Conference Centre in London on November 4, 2019. Speakers and keynotes covered what was happening in and around RabbitMQ, and how top companies utilized RabbitMQ to power their services.

  RabbitMQ Summit was organized by Erlang Solutions and CloudAMQP.
