description: |
  The first RabbitMQ Summit connected RabbitMQ users and developers from around the world in London on November 12, 2018. Speakers and keynotes covered what was happening in and around RabbitMQ, and how top companies utilized RabbitMQ to power their services.

  RabbitMQ Summit was organized by Erlang Solutions and CloudAMQP.
