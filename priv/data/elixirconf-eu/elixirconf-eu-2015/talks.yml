- title: "Rewriting a Ruby application in Elixir"
  slug: "rewriting-a-ruby-application-in-elixir-elix"
  kind: talk
  level: intermediate
  language: en
  duration: 45
  abstract: "Dragonfly is a fairly popular Ruby library to manage file uploads and it includes a Rack server to serve those files back. This talk is a postmortem of a rewrite of this server component in Elixir, so that it can be used to process Dragonfly-compatible urls with improved performance. The talk will focus on the structure of the application, managing pools of workers, pattern matching to simplify complex Ruby logic, interacting with external tools (like streaming data back and forth from Imagemagick) and deployment considerations."
