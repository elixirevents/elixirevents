- title: "Learn You Some 'ssl' for Much Security!"
  slug: "learn-you-some-ssl-for-much-security"
  kind: talk
  level: intermediate
  language: en
  duration: 40
  abstract: |
    Erlang/OTP's built-in 'ssl' application forms the basis of many client and server packages. Unfortunately it has quite a few quirks, potentially leading to weak security.

    Bram highlights the most important client and server settings for 'ssl' sockets, how the defaults have evolved across OTP versions, and how popular libraries build on them. Topics include cipher suite selection, server hostname verification, known certificate issues (wildcard SAN, cross-signed CA), revocation checks, ECDSA servers, and more.
  speakers:
    - bramverburg
  topics:
    - elixir
    - erlang
    - security
