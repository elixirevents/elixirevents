- title: "Lessons From Our First Trillion Messages with Flow"
  slug: "lessons-from-our-first-trillion-messages-with-flow"
  kind: talk
  level: intermediate
  language: en
  duration: 39
  abstract: |
    For many Elixir converts, the attraction of Elixir was rooted in the promise of the BEAM concurrency model. The Flow library has made it easy to build concurrent data pipelines utilising the BEAM. The problem is that while the docs are great, there are not many resources on running Flow-based systems in production.

