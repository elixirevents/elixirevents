      external_id: "hgDCg3QdZgU"
      url: "https://www.youtube.com/watch?v=hgDCg3QdZgU"

- title: "Leveraging ETS Effectively"
  slug: "leveraging-ets-effectively"
  kind: talk
  level: intermediate
  language: en
  duration: 46
  abstract: |
    ETS is pervasive, yet invisible. Evadne takes the audience on a deep dive into ETS, looking at its internals and ways to leverage it effectively within Elixir apps. The talk covers ETS functions, forming match specifications, using ETS for ephemeral/preset data, integrating ETS with Ecto (schemas and repos), emitting change notifications, and moving beyond ETS — leaving attendees with knowledge of when and where to use it, and patterns they can reuse.
