## Talks

- title: "From Zero to Elixir Deployment"
  slug: "from-zero-to-elixir-deployment"
  kind: talk
  level: intermediate
  language: en
  duration: 35
  abstract: |
    As developers, we have to face a harsh reality: even the most elegantly designed application is of little use unless deployed to a production server. But with new tools, services and abstraction layers popping up every day, it’s hard to keep up and choose the right solution for a project. This practical talk presents one possible answer to the question: What’s the best way to deploy an Elixir application? The topics covered range from configuration and Distillery to Continuous Deployment and using Docker.

    Objectives
    At the end of the talk, participants should have a good understanding of Distillery Releases and a practical starting point for deploying Elixir applications to cloud servers.

    Audience
    This talk is targeted at new members of the Elixir ecosystem as well as those who already know the language but have not yet gotten to the point of running an Elixir application in production. It is particularly useful for small teams and individual software developers who don’t have a dedicated IT Operations team at their disposal.
  speakers:
    - philippschmieder
  topics:
    - elixir
    - deployment
  recordings:
    - provider: youtube
      external_id: "Noawmmd6yxM"
      url: "https://www.youtube.com/watch?v=Noawmmd6yxM"

- title: "Exploiting PostgreSQL's Power with Elixir / Ecto Applications"
  slug: "exploiting-postgresqls-power-with-elixir-ecto-applications"
  kind: talk
  level: intermediate
  language: en
  duration: 40
  abstract: |
    When creating new apps with Elixir, we usually set up the database, then create users and groups tables, and proceed to define the rest of the data model according to the requirements. That's when we start coding the business logic and probably find ourselves writing a lot of access control logic for each query. Let's explore a different approach, that takes advantage of Postgres to write less code, keeping the important parts of the business logic agnostic to the language, but still enjoying the benefits of Elixir.

    Objectives
    Show a different way to write Elixir/Ecto/Postgrex applications using existent PostgreSQL features. Motivate the audience to explore alternative uses of PostgreSQL while writing Elixir applications.

    Audience
    Developers creating Elixir/Ecto/Phoenix applications that connect to PostgreSQL databases.
  speakers:
    - josesangil
  topics:
    - elixir
    - ecto
    - postgresql
  recordings:
    - provider: youtube
      external_id: "_WsnytOcJjY"
      url: "https://www.youtube.com/watch?v=_WsnytOcJjY"

- title: "Modular Design in Elixir"
  slug: "modular-design-in-elixir"
  kind: talk
  level: intermediate
  language: en
  duration: 44
  abstract: |
    Modular design is a great way to reduce complexity in software. In the Elixir ecosystem, the discussion around this topic has been energised by the introduction of Phoenix Contexts some time ago. Yet, coming up with good module boundaries is really hard and we lack ideas on how to do this well. Maciej will show a few techniques to ensue code is much easier to understand, test, and modify. After the talk, attendees will have some concrete techniques to design new features or improve existing codebases.

    Objectives
    Show how to tackle designing modules based on behaviour. Focus on a step-by-step approach, without changing the entire architecture.

    Audience
    Developers who work on systems with complex domain logic and would like to simplify them.
  speakers:
    - maciejkaszubowski
  topics:
    - elixir
  recordings:
