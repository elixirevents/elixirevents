description: |
  ElixirConf EU 2019 brought the European Elixir community together in Prague for two days of talks and one day of training, co-organised by ElixirConf and Code Sync.

  The conference featured keynotes from José Valim announcing Broadway and Chris McCord unveiling Phoenix LiveView, alongside talks on Ecto, Nerves, Scenic, Telemetry, property-based testing, and production case studies from across the ecosystem.
