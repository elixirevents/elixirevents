- title: "Optimizing LiveView for Realtime Applications"
  slug: "optimizing-liveview-for-realtime-applications"
  kind: talk
  level: intermediate
  language: en
  duration: 33
  abstract: |
    Phoenix LiveView has a well-deserved reputation for being highly efficient regarding server/client payload exchange and resource consumption. Most of that efficiency relies on keeping track of templates’ diffs and components’ assigns changes. For most common applications, developers usually don’t need to worry about such implementation details. However, when working with real-time applications that demand highly frequent updates, a deeper knowledge on the subject may be the key to avoid performance issues in production. In this talk, Marlus Saraiva will discuss the basic concepts behind Liveview’s diff tracking and component change tracking, as well as present several techniques that explore those concepts to improve the overall performance of your live views.
  speakers:
