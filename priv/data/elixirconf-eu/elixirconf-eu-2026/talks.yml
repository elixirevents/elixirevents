## Keynotes

- title: "The Latest on Elixir Types"
  slug: "keynote-the-latest-on-elixir-types"
  kind: keynote
  level: beginner
  language: en
  duration: 45
  abstract: |
    Four years ago, at ElixirConf EU, José Valim announced an effort to research and develop a type system for Elixir, later broken into three distinct milestones. With the upcoming Elixir v1.20 release, Elixir is finally closing down on the first milestone, which adds type inference to all language constructs. Come learn exactly what that means and where we are going next!
  speakers:
    - josevalim
  topics:
    - elixir
    - type-system

- title: "DurableServer: Always Running Somewhere"
  slug: "keynote-durableserver-always-running-somewhere"
  kind: keynote
  level: beginner
  language: en
  duration: 45
  abstract: |
    What if your processes could survive node failures, move between machines, and pick up where they left off? DurableServer extends the familiar GenServer contract with automatic state persistence, distributed coordination, and cluster-aware recovery. Watch complexity melt away while you get back to thinking in processes and messages. Durability becomes just another thing your processes do.

    In many applications, processes represent real things like users, game sessions, rooms, or devices. These need to be guaranteed running somewhere on the cluster, recoverable after crashes, and observable by the rest of the system. We’ll explore globally unique processes, state synced to object storage for restoration on any node, capacity-aware placement, sticky routing, and lifecycle events that let your application react as durable processes come and go.

    With DurableServer, routing, load balancing, node pinning, and regional placement are solved problems. You stop thinking about them. It all collapses down to something that feels like writing a regular GenServer.
  speakers:
    - chrismccord
  topics:
    - otp
    - distribution

- title: "One Monolith, Many Teams: Growing an Org with Elixir"
  slug: "keynote-one-monolith-many-teams"
  kind: keynote
  level: intermediate
  language: en
  duration: 45
  abstract: |
    Remote grew from a single engineering team into an organization with 50 engineering teams contributing to a large Elixir monolith. As the company expanded and AI continues to accelerate how we write and refactor code, the rate of change across our system keeps increasing.

    In this keynote, we’ll share how we evolved our architecture and our organization to support that pace. From domain boundaries and compile-time dependency management to worker separation, ownership-driven observability, and a dedicated Dev Experience team, we’ll explore the tradeoffs and lessons of keeping a large monolith healthy and productive as it grows.

    This is a story about scaling teams and systems together.
  speakers:
    - sofiasilva
    - andrealbuquerque
  topics:
    - elixir

## Talks

- title: "Agentic Elixir"
  slug: "agentic-elixir"
  kind: talk
  level: beginner
  language: en
  duration: 30
  abstract: |
    Yeah yeah yeah agents and AI and LLMs. It’s one of those talks.

    Coding agents, for now and obviously, are changing how we write software. How do these weird machinations fare against Elixir? In this talk, I’ll explore what makes Elixir uniquely suited to agentic workflows and where it falls short.

    We’ll see why a few seconds in test suite startup time compound into minutes and hours of agent time, and a bunch more things like that. You’ll learn practical techniques for optimizing your Elixir codebase for having the best possible agentic experience (and, who knows, pleasing the agent robots in case the revolution ever comes).

    A final disclaimer: I promise I’m not an AI fanatic—it’s a tool and I just try to get decent at using that tool. And I typed that em-dash back there, it wasn’t a robot.
  speakers:
    - andrealeopardi
  topics:
    - elixir
    - ai

- title: "Distilling the Stream: Kafka-Backed Elixir at Scale"
  slug: "distilling-the-stream-kafka-backed-elixir-at-scale"
  kind: talk
  level: advanced
  language: en
  duration: 30
  abstract: |
    At Fresha, Kafka is a core part of how many of our Elixir applications are designed and operated. In this talk, we share how we build Kafka-backed applications in Elixir at scale: the patterns we standardised on, the trade-offs we made and the mistakes we learned from in production.

    We’ll focus on how Kafka fits into application design rather than treating it as a generic messaging layer, and on how we make its use consistent and safe across teams.

    We’ll also cover what we had to build and contribute to support this approach, including upstream work on kafka_ex (authentication, new compression codecs and support for newer Kafka APIs and protocol versions) and internal Elixir tooling, which we’re in the process of open-sourcing, that encodes core patterns such as partitioning and consumer concurrency, Inbox and Outbox patterns, retries with backoff, dead-letter handling, tracing and operational visibility.

    This is a practical, opinionated talk based on real production experience, for teams building serious Kafka-based systems in Elixir.
  speakers:
    - antonborisov
    - piotrrybarczyk
  topics:
    - elixir
    - kafka

- title: "Deterministic LLM UI Rendering in Phoenix LiveView"
  slug: "deterministic-llm-ui-rendering-in-phoenix-liveview"
  kind: talk
  level: intermediate
  language: en
  duration: 30
  abstract: |
    LLMs are excellent at text and unreliable at UI. This session shows how to extend Markdown into a deterministic UI contract in Phoenix LiveView by introducing custom blocks that represent interactive components not found in standard Markdown (suggestions, insight cards, charts). We’ll stream tokens (SSE), incrementally parse and validate blocks as they arrive, and render only a set of these custom components the moment each block becomes complete—progressively upgrading from plain Markdown to interactivity without flicker.
  speakers:
    - anthonyleiro
  topics:
    - liveview
    - ai

- title: "Hologram: The Journey to Local-First Elixir in the Browser"
  slug: "hologram-the-journey-to-local-first-elixir-in-the-browser"
  kind: talk
  level: intermediate
  language: en
  duration: 30
  abstract: |
    Since introducing Hologram at ElixirConf 2025, development has focused on building the foundations needed for Local-First applications with pure Elixir in the browser. This talk charts Hologram’s journey over the past year, showcasing concrete progress in client-side capabilities and developer tooling - each piece moving closer to true Local-First functionality. I’ll demonstrate practical examples of enhanced client-side features built entirely in Elixir, discuss the architectural decisions that enable offline-first patterns, and explain how each improvement contributes to the larger Local-First vision. Attendees will see working code, understand the technical building blocks required for Local-First applications, and learn about the roadmap for bringing full Local-First capabilities to the Elixir ecosystem.
  speakers:
    - bartblast
  topics:
    - elixir
    - hologram

- title: "Surveyor: Extracting Specifications from Legacy Software with Elixir"
  slug: "surveyor-extracting-specifications-from-legacy-software"
  kind: talk
  level: intermediate
  language: en
  duration: 30
  abstract: |
    Legacy software can quickly become a team’s nemesis. A codebase earns the ‘legacy’ label the moment its maintainers lose confidence - and motivation - in it. During the onboarding process, you sometimes hear, ‘And then there’s this legacy system…’. This is shorthand for a part of the architecture that the team no longer believes can meet modern expectations of technology, structure or style.

    Replacing legacy software is especially challenging if it was created ad hoc; in an agile, manner but undocumented. Without specifications. Estimating the effort required for a rewrite becomes little more than an educated guess, and nobody can be sure that every critical function has been accounted for.

    Tools such as Cursor, Deepwiki and Claude can analyse code bases and assist with onboarding and documentation. But how do they work?

    Can we create our own toolset and include game changing tools like Tidewave?

    This talk will explore how commercial AI agents analyse code and demonstrate how these tools can be implemented in Elixir and on-premise.

    Finally, we will introduce Surveyor: a toolkit that brings together these tools to generate documentation and specifications from a codebase.
  speakers:
    - chrisbeck
  topics:
    - elixir
    - ai
    - code-intelligence
    - engineering
    - documentation

- title: "A Murder of LiveViews: Distributed Load Testing with AMoC and FLAME"
  slug: "a-murder-of-liveviews-distributed-load-testing"
  kind: talk
  level: intermediate
  language: en
  duration: 30
  abstract: |
    A little over a decade ago, Phoenix proved that it could handle 2 million WebSocket connections. A lot has changed since then, and with LiveView, the paradigm has shifted! Connections aren’t the only bottleneck anymore, your LiveView architecture is. How you structure Functional Components, LiveComponents, Streams, and Async Assigns all affect performance under load. How do you know your app can handle real traffic? This talk introduces a distributed approach using AMoC (“A Murder of Crows” from Erlang Solutions) and FLAME to coordinate thousands of users across elastically scaled compute. You’ll learn to write scenarios measuring what actually matters for LiveView performance: mount and event round-trip latencies, diff sizes, and LiveView performance across different LiveView patterns. We’ll explore the architecture, walk through scenario design, and depending on where progress is at, demonstrate spinning up distributed runners against a live application.
  speakers:
    - cobybenveniste
  topics:
    - liveview
    - distribution
    - flame

- title: "Atomic-Scale Elixir"
  slug: "atomic-scale-elixir"
  kind: talk
  level: beginner
  language: en
  duration: 30
  abstract: |
    Last year at ElixirConf EU 2025, we briefly introduced AtomVM and the new horizons on the web with Popcorn. This year, we’ll go deeper into the hardware world, discovering how Elixir can be used for physical computing, even on inexpensive, resource-constrained microcontrollers.

    This talk will go beyond the introduction, with a hands-on approach to using AtomVM to build a real project, using the Elixir tools and workflow available today.
  speakers:
    - davidebettio
  topics:
    - elixir
    - embedded

- title: "Live Coding a Nerves Robot with LiveBook"
  slug: "live-coding-a-nerves-robot-with-livebook"
  kind: talk
  level: beginner
  language: en
  duration: 30
  abstract: |
    Several years ago, Dennis started reading the book “Arduino Robot Bonanza” by Gordon McComb. He had assumed that an Arduino was required to build robots like those described in the book, but has since discovered that a Raspberry Pi running Elixir via Nerves, along with Hex packages like Circuits.I2C could do much, if not all, the same things.

    Inspired by the Teachbot platform described by McComb, he designed and 3D printed Wobbles, a self-balancing 2-wheel robot powered by Nerves and programmed via Livebook.

    In this session, we will see a hands-on demo of using binary pattern matching in a GenServer to read the gyro/accelerometer data via I2C and control the motors to make Wobbles a little less wobbly. Then we’ll walk through how to use an ultrasonic distance sensor to help prevent collisions when he starts to move.
  speakers:
    - dennispalmer
  topics:
    - nerves
    - livebook

- title: "Legion: Agentic Code Execution with Pure Elixir"
  slug: "legion-agentic-code-execution-with-pure-elixir"
  kind: talk
  level: intermediate
  language: en
  duration: 30
  abstract: |
    Most AI agents are trapped in a “chat-and-call” loop, restricted by rigid function-calling interfaces. Legion breaks this cycle. It introduces a paradigm where agents don’t just request actions - they execute them. By allowing LLMs to run vetted Elixir code in isolated sandboxes, Legion enables agents to spawn other agents, exchange messages, and react to events in real-time. There is no new DSL or steep learning curve, Legion turns your pure modules and functions into an autonomous toolbox. You write the limbs - Legion provides the nervous system to orchestrate them.
  speakers:
    - dimamikielewicz
  topics:
    - elixir
    - ai

- title: "Elixir Beyond Phoenix: Building a Game Server"
  slug: "elixir-beyond-phoenix-building-a-game-server"
  kind: talk
  level: intermediate
  language: en
  duration: 30
  abstract: |
    Is Elixir great for writing games? I’m not too sure about the client side, but for game servers, I think it’s a swell choice.

    I’m familiar with game servers. I built an MMORPG server at a game platform startup I co-founded (in Java) and ran the tech groups for games at Nickelodeon, including an MMORPG for kids and Neopets.

    In this talk, we’ll start with a simple single-player roguelike running in LiveView. Then, through a series of code reviews and live merges, we’ll turn it into a multiplayer game. You’ll get to connect and, who knows, perhaps even defeat the BBEG!

    You’ll leave understanding why the actor model makes “add more players” straightforward - no promises, no mutexes, just processes talking to each other.

    Bring your phone. You’re part of the demo.

    Ellyse speaks about programming languages, distributed systems, and making complex things tangible. She’s based in Paris and can sometimes be found doing real work instead of having fun.
  speakers:
    - ellysecedeno
  topics:
    - elixir
    - otp

- title: "Guaranteed Journeys"
  slug: "guaranteed-journeys"
  kind: talk
  level: intermediate
  language: en
  duration: 30
  abstract: |
    In the world of B2B ride-hailing, reliability is currency. Failing to assign a ride for a corporate client doesn’t just annoy a user—it jeopardizes entire enterprise contracts.

    At Cabify, our operations team initially relied on a Looker Studio dashboard to manage these critical journeys. The result was frustration: data was stale due to polling, BigQuery costs were mounting, and agents were losing precious seconds waiting for refreshes while VIP clients waited for rides.

    We needed a replacement that was real-time, cost-efficient, and reliable. We needed it immediately.

    This talk dissects how a single backend developer replaced that legacy solution with a Phoenix LiveView dashboard in just two weeks, achieving a 99% assignment success rate.
  speakers:
    - gabrielortuno
  topics:
    - liveview

- title: "Arcana: Production-Ready RAG Entirely in Elixir"
  slug: "arcana-production-ready-rag-entirely-in-elixir"
  kind: talk
  level: intermediate
  language: en
  duration: 30
  abstract: |
    In this talk, I’ll introduce Arcana (https://github.com/georgeguimaraes/arcana), an open-source library that brings RAG to the BEAM. Using Nx and Bumblebee, Arcana runs embedding models locally, no external APIs needed. Combined with pgvector for vector storage and Phoenix LiveView for the dashboard, you get a complete RAG solution that feels native to Elixir.

    We’ll cover:

    - How RAG works and why it matters for AI applications
    - Running embedding models locally with Nx and Bumblebee
    - Efficient document chunking strategies
    - Vector similarity search with pgvector
    - Building agentic RAG pipelines: query expansion, re-ranking, and self-correcting answers
    - Pluggable components via behaviour: swap any pipeline step with your own implementation
    - Building an evaluation framework to measure retrieval quality
    - You’ll leave with practical knowledge to add semantic search and agentic RAG capabilities to your Phoenix applications, keeping your AI stack simple, fast, and 100% Elixir.

  speakers:
    - georgeguimaraes
  topics:
    - elixir
    - machine-learning
    - ai

- title: "Nerves, NIFs, and Snake"
  slug: "nerves-nifs-and-snake"
  kind: talk
  level: intermediate
  language: en
  duration: 30
  abstract: |
    This talk will walk you through the process I went through of bringing Nerves support to a custom e-ink device. The story walks through the last year or so of development of this project, including a look at how a LiveView-like model for representing stateful systems can be applied to hardware and e-ink displays.

    Several NIF libraries were developed for this project. I’ll discuss some of the reasons for using NIFs and tips for getting Rustler to play nice with Nerves.

    Finally, I’ll show you my version of e-ink snake, and we’ll talk how you can get started building your own e-ink apps using the open source hardware designed for this project.
  speakers:
    - gusworkman
  topics:
    - nerves
    - rust

- title: "How Elixir Learns Types from Guards"
  slug: "how-elixir-learns-types-from-guards"
  kind: talk
  level: intermediate
  language: en
  duration: 30
  abstract: "Elixir’s type system derives type information directly from guard expressions rather than introducing a separate type language. This talk examines the mechanics: how the checker interprets is_* guards as base types, how conjunction and disjunction translate to intersection and union types, and how negation types emerge from clause ordering. We’ll look at the inference rules, walk through non-obvious cases, and explore where the current implementation hits its limits."
  speakers:
    - guillaumeduboc
  topics:
    - elixir
    - type-system
    - compilers

- title: "Distributed Erlang Lessons from Livebook"
  slug: "distributed-erlang-lessons-from-livebook"
  kind: talk
  level: intermediate
  language: en
  duration: 30
  abstract: |
    Livebook runs each notebook on its own BEAM node, connects to Phoenix apps transparently, and spins up runtimes on remote machines, all without EPMD. How?

    In this talk, we’ll highlight three distributed Erlang techniques from Livebook’s source code. For each one, you’ll see the real-world Livebook feature first, then the Erlang primitive that powers it, followed by a simple standalone example you can use immediately.
  speakers:
    - hugobarauna
  topics:
    - erlang
    - livebook
    - distribution

- title: "Lit Up LiveView"
  slug: "lit-up-liveview"
  kind: talk
  level: intermediate
  language: en
  duration: 30
  abstract: |
    Almost every LiveView developer reaches a point where they need rich client-side interactivity - a textarea that resizes, a drop zone that responds to dragging, a button that manages its own state. These interactions don’t need the server, and LiveView isn’t designed to handle them. Web Components are a natural fit for this. Unlike framework-specific solutions, they require no integration layer - just custom HTML elements in your HEEx templates that react to attribute changes, exactly how LiveView already works. In this talk, I’ll share why this solution has worked so well for me and why I enjoy its simplicity. We’ll explore how Web Components align with LiveView’s model, then build a real component using Lit and integrate it into a LiveView application. You’ll leave with patterns you can apply immediately.
  speakers:
    - idoleshkowitz
  topics:
    - liveview

- title: "Hooked on Widgets"
  slug: "hooked-on-widgets"
  kind: talk
  level: intermediate
  language: en
  duration: 30
  abstract: |
    Building reusable, stateful widgets in Phoenix LiveView has been challenging. LiveComponents can’t access the process mailbox for PubSub integration, while embedded LiveViews create performance overhead and complex communication patterns. This talk presents a battle-tested alternative: combining function components with LiveView hooks to create truly independent widgets.

    You’ll learn how to leverage attach_hook/4 to build widgets that manage their own state, handle events, subscribe to PubSub, and seamlessly integrate into any LiveView — without coupling to parent implementations. Through a real-world notification widget example, we’ll demonstrate how this pattern delivers the best of both worlds: LiveComponent-like behavior with direct mailbox access.
  speakers:
    - jakublambrych
  topics:
    - liveview

- title: "Elixir Is for DOING Things"
  slug: "elixir-is-for-doing-things"
  kind: talk
  level: intermediate
  language: en
  duration: 30
  abstract: |
    Elixir and Erlang were created to solve problems in the real world. OTP is not just gen_servers and supervisors but a maximalist, batteries included standard library with a deep set documented and undocumented tools. And thanks to NIF’s there really is no limit to what we can accomplish on our computers. Join me on an exploration of some of OTP’s internals and hidden modules and learn about the incredible power of NIF’s.
  speakers:
    - jasonstiebs
  topics:
    - elixir
    - otp
    - rust

- title: "AI-Powered Search at Scale"
  slug: "ai-powered-search-at-scale"
  kind: talk
  level: intermediate
  language: en
  duration: 30
  abstract: |
    At Frame.io (Adobe), we built AI-powered search to help creative professionals find the exact shot or moment across millions of assets. This required two AI integrations: an LLM for natural language queries and vector embeddings for semantic visual search. Our LLM component uses Meta’s Llama 4 via AWS Bedrock, translating queries like “videos of people on beaches from last week” into OpenSearch DSL. For visual search, we generate vector embeddings using Adobe’s SearchCut API (CLIP-based models), enabling similarity searches without metadata. The challenge? Video embedding takes 30+ seconds per asset. Our Oban infrastructure—already split across four instances due to database contention—couldn’t handle this load without impacting critical jobs. Our solution: a multi-stage Broadway pipeline consuming from SQS. A router pipeline handles authorization and versioning, fanning out to dedicated embedding and transcription workers. This provides independent scaling, traffic buffering, and complete isolation from our job system. You’ll learn: practical LLM integration patterns, when to choose Broadway over Oban, and how to build observable AI pipelines in Elixir.
  speakers:
    - jeffweiss
  topics:
    - elixir
    - ai

- title: "Building Real-Time AI Agents with Elixir"
  slug: "building-real-time-ai-agents-with-elixir"
  kind: talk
  level: intermediate
  language: en
  duration: 30
  abstract: |
    Discover how Elixir’s concurrency model enables building autonomous AI agents that handle diverse tasks at massive scale. Whether you’re building agents for web scraping, managing logins across multiple platforms, or processing real-time data, Elixir provides the perfect foundation for reliable, fault-tolerant automation.

    This talk explores practical patterns for building AI agents that work independently and handle millions of operations concurrently. We’ll look at how to integrate AI models with Elixir and use its built-in tools like GenServers and supervision trees to create agents that recover from failures automatically and never stop working.

    You’ll learn proven strategies for common challenges: coordinating multiple agents working together, managing stateful operations like authenticated sessions, processing data in real-time, and scaling to handle massive workloads. We’ll cover real-world examples from web scraping to automated interactions across different platforms.
  speakers:
    - kimutaikiprotich
  topics:
    - elixir
    - ai
    - otp

- title: "Exploring State Management in Phoenix LiveView"
  slug: "exploring-state-management-in-phoenix-liveview"
  kind: talk
  level: intermediate
  language: en
  duration: 30
  abstract: |
    State management in Phoenix LiveView becomes increasingly challenging as applications grow in size and complexity. Some of these challenges are recurring ones familiar from other frontend libraries such as React, where developers often deal with shared state, prop drilling, and synchronizing data across components. Others are unique to LiveView’s server-driven model, including maintaining consistent state across nested LiveViews, coordinating updates, and dealing with state loss during disconnects or deployments.

    In this talk, we will explore how these problems are currently addressed within the LiveView ecosystem, examining the tools, patterns, and workarounds developers rely on today. We will also look at how other frontend libraries approach similar challenges and identify which ideas can or cannot be translated into LiveView’s architecture. Finally, we will combine insights from both worlds to outline what simple, predictable, and resilient state management in LiveView could look like.
  speakers:
    - krzysztofnalepa
  topics:
    - liveview

- title: "The Everything App"
  slug: "the-everything-app"
  kind: talk
  level: intermediate
  language: en
  duration: 30
  abstract: |
    Phoenix, LiveView, Membrane, Nerves and Nx. This talk shows a production app that exercises a large amount of the Elixir ecosystem. ExNVR by Evercam is a networked video recorder and an open source project. It streams video from multiple IP cameras to store on disk. We will grab frames from the stream to perform inference. We’ll display UI to the user. And we will do it on affordable embedded hardware at respectable speeds.

    And we’ll learn some things along the way.

    ExNVR runs on at least a thousand devices world-wide as part of Evercam.
  speakers:
    - larswikman
  topics:
    - phoenix
    - liveview
    - webrtc
    - nerves
    - machine-learning
    - ai

- title: "Rebuilding Workflow Orchestration in Elixir: The Story of Gust"
  slug: "rebuilding-workflow-orchestration-in-elixir-the-story-of-gust"
  kind: talk
  level: intermediate
  language: en
  duration: 30
  abstract: "A case study on building Gust, a durable workflow orchestration system in Elixir, after getting frustrated with Python/Airflow. I’ll break down what “orchestration” really means, what Airflow does well (and where it gets heavy), then walk through Gust’s core pieces: task, scheduling, retries, logs/observability, and secrets. Finally, I’ll show how OTP supervision and lightweight processes enabled a simpler, more reliable engine with major efficiency and performance gains."
  speakers:
    - marcioklepacz
  topics:
    - elixir
    - otp

- title: "Broadcasting Your Terminal with Asciinema"
  slug: "broadcasting-your-terminal-with-asciinema"
  kind: talk
  level: intermediate
  language: en
  duration: 30
  abstract: |
    In this talk, we’ll take a look under the hood of asciinema server -the server-side component of asciinema suite for recording and live-streaming terminal sessions - and see how Elixir, Phoenix, and BEAM/OTP enable many great features with minimal effort and ceremony.

    We’ll focus on live terminal streaming, a feature that lets you broadcast terminal sessions on the internet. From stream parsing, through integrating Rust, implementing GenServers that manage live stream state, to LiveView-powered previews (thumbnails), we’ll cover the whole pipeline.
  speakers:
    - marcinkulik
  topics:
    - elixir
    - rust
    - liveview

- title: "Testing Concurrency and Fault Tolerance in Elixir/Nerves"
  slug: "testing-concurrency-and-fault-tolerance-in-elixir-nerves"
  kind: talk
  level: intermediate
  language: en
  duration: 30
  abstract: |
    In my talk, I want to present how Elixir/Nerves performs in a real-world audiovisual sensor network. Using a large number of sensors - some interactive with user input, others environmental - and processing unreliable data can be very challenging, especially for long-running, unattended systems. Sensors can malfunction, and hardware components can fail. As Elixir comes with mechanisms like lightweight processes and isolation, which ensure fault tolerance, it could be a perfect choice in such cases.

    As such systems aren’t easy to simulate, I plan to build a real prototype with physical sensors based on an architecture that combines Arduinos (as sensor controllers), Raspberry Pi (as the backbone of the project running Nerves/Elixir for event processing), and an audiovisual output layer. That allows testing the real system’s behaviour under sensor failures, process crashes, and unreliable data. The audiovisual nature of the project provides immediate visibility into the system in real-time. Thus, I’ll present the system during the talk with controlled audience interaction.
  speakers:
    - martahabdas
  topics:
    - nerves
    - embedded

- title: "Let's Cut the Cord: Bringing LiveView to the Client with Popcorn"
  slug: "lets-cut-the-cord-bringing-liveview-to-the-client-with-popcorn"
  kind: talk
  level: beginner
  language: en
  duration: 30
  abstract: |
    Phoenix LiveView revolutionized web development by moving state to the server, allowing developers to build rich, interactive experiences without the overhead of complex JavaScript frameworks. But this power comes with a physical constraint: the round-trip time to the server. For high-interactivity features or users on high-latency connections, it can still be a barrier to a truly “instant” feel.

    In this talk, we explore a new frontier for the Elixir ecosystem: running LiveView natively in the browser. Local LiveView preserves the programming model we love — functional components, stateful processes, and HEEx templates — but executes them on the client side. By removing the requirement to reach the server for every event, we can achieve sub-millisecond latency and offline capabilities while staying within the Elixir paradigm.
  speakers:
    - mateuszfront
  topics:
    - liveview
    - libraries

- title: "Your First AI Feature in Elixir"
  slug: "your-first-ai-feature-in-elixir"
  kind: talk
  level: beginner
  language: en
  duration: 30
  abstract: |
    AI is showing up in everything lately, and as an Elixir engineer it’s not always obvious where to start without falling into the usual toy demos (Is this a banana?). In this talk I’ll share a real app that runs fully locally on a Raspberry Pi: a voice-controlled smart-light system where Elixir owns the whole stack. We’ll walk through the architecture from end to end. You’ll see how Membrane captures and chunks audio, how a Phoenix LiveView dashboard makes the system easy to observe and tweak, and where Nx/Axon fits when you want small, practical models like wake-word detection and intent classification. I’ll keep it grounded in the “how”: turning a rough prototype into something usable, collecting just enough data to train a first model, and wiring the pieces together so the result feels like a real feature, not a science project. By the end, you’ll have a clear picture of where Elixir fits in AI/ML today, plus a working smart control device in your house powered by Elixir that you can keep extending as you learn.
  speakers:
    - misaelperez
  topics:
    - elixir
    - ai
    - embedded

- title: "Background Jobs with Elixir: Oban in the Real World"
  slug: "background-jobs-with-elixir-oban-in-the-real-world"
  kind: talk
  level: intermediate
  language: en
  duration: 30
  abstract: |
    Background jobs are a staple in any seasoned engineer’s toolbelt. But in an ecosystem where OTP is readily available and concurrency is a first-class citizen, where exactly does a library like Oban fit? And more importantly, what happens when you hit the “scaling wall” of 10 million jobs a day?

    Thinking of background processing at this magnitude requires a shift in strategy. It’s no longer just about using the library, it’s about leveraging advanced database techniques and the full power of Distributed Elixir (Erlang). Drawing from a production-proven implementation, we will explore:
    - The “Why”: A critical comparison of Oban vs. pure GenServers vs. Broadway. When is the overhead of a database-backed queue a feature, and when is it a bottleneck?
    - The “How”: Solving real-world challenges including strict rate-limiting for brittle external APIs, managing job distribution across a multi-node cluster, and handling dynamic scheduling (from crontabs to self-enqueueing recursive workers).
    - The “Cost”: Tactical patterns for maintaining Postgres health under high-volume job churn, focusing on index bloat, pruning, and transactional integrity.
  speakers:
    - noelialencina
  topics:
    - elixir
    - oban
    - distribution

- title: "Union of the Snake"
  slug: "union-of-the-snake"
  kind: talk
  level: intermediate
  language: en
  duration: 30
  abstract: |
    How do you port a highly concurrent framework from Elixir—a platform with arguably the best concurrency story in the industry—to Python, a language with a flawed one at best? In this talk, we’ll show how we tried, and along the way managed to prove “Virding’s First Rule of Programming”.

    This goes deeper than wrestling with mutability or the emotional burden of imperative loops. We’ll dig into the techniques we used to work around Python’s concurrency limitations in order to implement a BEAM-inspired architecture, including:
    - Supervising autonomous objects
    - Monitoring object lifecycles
    - Replicating GenServers with async loops
    - Communicating without native distribution
    - You’ll have a renewed appreciation for Elixir: an expressive syntax, fantastic tooling, and a community that converges on a shared set of fundamental abstractions. Nothing clarifies the strengths of a system quite like trying to rebuild it elsewhere.

    Come and learn how we blended Elixir’s sensibilities with Python’s semantics to build the best async, concurrent, distributed background job framework we could manage—and what we learned in the process.
  speakers:
    - parkerselbert
    - shannonselbert
  topics:
    - otp
    - erlang

- title: "Mapping the Cloud with Elixir"
  slug: "mapping-the-cloud-with-elixir"
  kind: talk
  level: intermediate
  language: en
  duration: 30
  abstract: |
    The “Cloud” sometimes feels like this abstract thing you deploy your server to and otherwise forget about. But what does it look like? What pathways connect this globally spanning network of datacenters? I used Elixir to find out.

    I deployed an Erlang cluster of tiny probes across 100+ datacenters on AWS, GCP, and Azure, collecting months of traceroute data in TimescaleDB to map the hidden topology of the cloud. This talk explores how I deployed the probes efficiently and cheaply, what the data revealed, and the practical challenges of running a globally distributed Elixir system.
  speakers:
    - peterullrich
  topics:
    - elixir
    - erlang
    - deployment

- title: "The Hitchhikers Guide to Distributing Code & Math Across Africa"
  slug: "the-hitchhikers-guide-to-distributing-code-and-math-across-africa"
  kind: talk
  level: intermediate
  language: en
  duration: 30
  abstract: |
    In the beginning, Joe Armstrong created Erlang and it was good. There was a network. Processes could finally talk to each other, nodes could find each other. There was no WIFI. There was no Android kernel engineer dropping multicast packets. There was no Internet.

    Running reliable distributed software in the Africa harkens back to the early days, except for the conspicuous lack of trusty network cables filling up the room.

    Join us on our journey to distributing software in the most unlikely places to find reliable networking in the 21st century.

    From distributing self-hostable software on USB sticks to debugging distributed gossip-based broadcast networks in school computer labs 10,000 miles away with the help of a trusty community of mathophiles we befriended along the way.
  speakers:
    - princetonpoh
    - vivekbala
  topics:
    - elixir
    - deployment
    - distribution

- title: "Billions of Records, Three Engineers: Practical Data Orchestration in Elixir"
  slug: "billions-of-records-three-engineers"
  kind: talk
  level: intermediate
  language: en
  duration: 30
  abstract: |
    In 2018, we decided to rewrite our Groovy-based data platform in Elixir. Today, we run roughly 25,000 jobs processing 2 billion records per day in a single Elixir/Phoenix application. We (Tolemi) integrate with and combine hundreds of various data sources to provide municipal governments across the USA with daily spatial data insights.

    In this talk, I’ll walk through the key design decisions that allowed a team of three to migrate to Elixir, scale to this level while keeping complexity low and enabling implementation developers to contribute to our data pipelines.

    We use Elixir’s concurrency model for orchestration, and Elixir as a glue layer that allows databases, containers, and scripts written in other languages (Python, DuckDB, Groovy, R scripts) to be used where they are most effective.

    Through a series of practical code snippets and architectural choices, I will share the hard-won lessons and specific performance bottlenecks we overcame to maintain a lean, high-throughput data pipeline.
  speakers:
    - silviazeamer
  topics:
    - elixir
    - postgresql

- title: "Update from the Phoenix Team"
  slug: "update-from-the-phoenix-team"
  kind: talk
  level: beginner
  language: en
  duration: 30
  abstract: "A look at the previous Phoenix and LiveView releases (1.8, 1.1) - updates on what the team is planning to work on for future releases. There’s no ETA for a new update at the moment, but there are a bunch of ideas for future developments floating around that we can present and request feedback from the community."
  speakers:
    - steffendeusch
  topics:
    - phoenix
    - liveview

- title: "From Idea to Traction: Using Elixir to Ship Fast"
  slug: "from-idea-to-traction-using-elixir-to-ship-fast"
  kind: talk
  level: beginner
  language: en
  duration: 30
  abstract: "Have you ever wanted to release your own product but felt blocked by lack of time, money, or confidence? In this talk I’ll show how Elixir can be used not just to build elegant systems, but to move from idea to traction quickly. I’ll share how I’m building a LiveView-powered learning platform that improves developer efficiency using gamification, cognitive science, and AI - and how a clean Elixir architecture lets me move fast without losing control. This working prototype is built with one clear goal: testing traction. I’ll walk through the technical choices that support rapid iteration, including Phoenix LiveView patterns for interactive flows, structuring multiple Phoenix apps in a monorepo with independent releases, deploying on Fly.io, integrating AI tools like Tidewave, and what I learned upgrading Elixir, Erlang, and OTP while moving quickly. With over 10 years of Elixir experience, I’ll show how good architecture becomes an accelerator, not a blocker, when you’re trying to ship and learn at the same time."
  speakers:
    - tetianadushenkivska
  topics:
    - elixir
    - liveview
    - ai

- title: "Building Desktop Apps with ElixirKit and Tauri"
  slug: "building-desktop-apps-with-elixirkit-and-tauri"
  kind: talk
  level: intermediate
  language: en
  duration: 30
  abstract: "In this talk I’ll present building cross-platform desktop applications with ElixirKit and Tauri. Tauri is a framework for creating small, fast, and secure cross-platform applicat ions using Web frontend technologies and/or Rust. ElixirKit started out as Elixir and Swift/C# bridge for Livebook Desktop and in the latest iteration has been re-designed to use Rust – a perfect fit for Tauri. We will also cover distributing desktop applications, including code-signing and automatic software updates."
  speakers:
    - wojtekmach
  topics:
    - elixir
    - rust
    - livebook

- title: "Model the Work: Real Life Workloads with Ash & Oban"
  slug: "model-the-work-real-life-workloads-with-ash-and-oban"
  kind: talk
  level: intermediate
  language: en
  duration: 30
  abstract: |
    At small scale, you can get away with using schedule_at with. When you have a large team, millions of jobs per day, hundreds of complex workflows, that approach breaks down.

    In this talk, we look at real production workloads: webhook ingestion and delivery, reminders and notifications, appointment scheduling, order shipment, and fulfillment. These are long-lived, time-based workflows that need to behave predictably across retries, deploys, crashes, and changing requirements.

    The core idea is simple: your jobs table is not a domain model. If a piece of work matters, it should exist as application state. A reminder isn’t an Oban job, but a Reminder that moves from unsent to sent. A shipment isn’t a background task, it’s a Shipment with a lifecycle.

    We’ll walk through how we model this kind of work using Ash resources, AshStateMachine, and AshOban. This approach comes with huge benefits, as well as a few sharp edges & foot guns that we’ll learn to sidestep.

    Along the way, we’ll look at how this approach makes systems easier to reason about, safer to retry, and dramatically easier to refactor as requirements evolve, without losing the operational reliability you need at scale.
  speakers:
    - zachdaniel
  topics:
    - elixir
    - ash
