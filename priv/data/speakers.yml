  bio: |
    Zurab started programming as a kid on an Olivetti 286 laptop running DR-DOS. Since then he has worked anywhere from startups to large corporations, accumulating an extensive experience creating, and leading teams to create, web applications and services. Currently a software engineer at LaunchDarkly, Zurab loves challenges brought by concurrency and distributed systems.
  social_links:
    - platform: twitter
      url: "https://x.com/zurab"
    - platform: github
      url: "https://github.com/unix1"

- name: "Ananya Shandilya"
  slug: "ananyashandilya"
  headline: "Staff Software Engineer at LinkedIn"
  bio: |
    Ananya is a Staff Software Engineer at LinkedIn solving problems in the infrastructure observability domain. She has been an Erlang developer for the last 3 years working on the network flow collection and processing system. She is a polyglot developer who can code in Erlang, Golang, Java and Python.

- name: "Byron Saltysiak"
  slug: "byronsaltysiak"
  headline: "CTO at AdmIntel Inc"
  bio: |
    I’m Byron Saltysiak (https://byronsalty.com) I’ve been in Software Dev for over 20 years at Turner Broadcasting most of my career running services for sites like CNN, NBA and CartoonNetwork.

    I was involved in the DockYard Academy Elixir bootcamp and I'm now I'm a mentor for them.

    I’m now CTO at a start-up called AdmIntel Inc, building Elixir/Phoenix based AI/LLM powered products.

- name: "David Ansari"
  slug: "davidansari"
  headline: "Software Engineer, VMware"
  bio: |
    David Ansari (Twitter: @david1ansari, GitHub: @ansd) is a software engineer at VMware. He joined the RabbitMQ team three years ago. In the past, he was a Cloud Foundry core contributor. David gave talks at KubeCon + CloudNativeCon, RabbitMQ Summit, Cloud Foundry Summit, VMware EMEA Tech Talk, and OOP Conference.

- name: "Emily deGroot"
  slug: "emilydegroot"
  headline: "Stay Focused, Stay hopeful."
  bio: |
    As a passionate advocate for the intersection of environmentalism and technology, I am dedicated to supporting environmental innovators as they tackle local economic, social, and environmental challenges. Through my work with the Open Landscape Network, I am committed to promoting accessibility to sustainable digital finance through nature-based solutions.

- name: "Erin Boeger"
  slug: "erinboeger"
  headline: "Erlang Solutions"
  bio: |
    Erin has been working for several years in the Fin-Tech sector. Erin has designed and built many complex systems such as PCI compliant credit card vaults, funds transfer systems, authentications systems, accounting ledger systems, and experience with Blockchain. Erin has a focus on quality and creates extensive automated tests when building applications. Erin has a military and business background and is experienced with hiring and training software developers.

- name: "Gourab Mitra"
  slug: "gourabmitra"
  headline: "Software Engineer at Datometry"
  bio: |
    Gourab Mitra works as a Software Engineer at Datometry. He became part of the BEAM ecosystem while developing products at Datometry in 2018. He has worked across the globe in various industries. He started his career as an aspiring software engineer who used to work wearing a hard hat and steel-toed boots. He holds an MS in Computer Science from the State University of New York at Buffalo, New York, and a BS in Information Technology from Birla Institute of Technology, Mesra, India. Outside of work, he is an avid yogi and a public speaker

- name: "Henry Sun"
  slug: "henrysun"
  headline: "Software Engineer at WhatsApp"
  bio: |
    Henry Sun has 4 years of experience designing highly distributed systems in Erlang at WhatsApp where he works on the distributed storage system that underlies WhatsApp messaging and WhatsApp Channels. During this time, he built and maintains WARaft, an Erlang implementation of the RAFT consensus algorithm geared towards the development of strongly consistent distributed storage solutions in Erlang. Previously, Henry Sun studied Computer Science at Caltech where he did research on compilers and operating systems design.

- name: "Ian Butler"
  slug: "ianbutler"
  headline: "Tech Lead, Senior Engineer II"
  bio: |
    Writing code for over 20 years Ian has worked on everything from API development to data engineering and currently he is a Tech Lead for the Data Intelligence team. Ian currently does a lot of work with distributed systems, search, data processing and analytics. His current passion project is writing a full text distributed search engine using existing databases like Postgres and MySQL as the data store.

- name: "Ihor Kuz"
  slug: "ihorkuz"
  headline: "Operating system engineer at Kry10 and seL4 TSC member"
  bio: |
    Dr. Ihor Kuz is an operating system engineer at Kry10, helping develop the Kry10 OS and Platform. Ihor has previous experience leading the team developing the seL4 microkernel, and has been involved with seL4 for as long as it's been around. He is also an associate professor at UNSW in Australia and has taught distributed systems and Erlang there for many years.

- name: "Justin Scherer"
  slug: "justinscherer"
  headline: "NM Lead Software Engineer"
  bio: |
    Justin Scherer has been professionally developing applications for over 10 years. On top of this, he has worked in a variety of fields ranging from embedded systems to high-performance cluster applications. Justin has led development teams that utilize JavaScript on the web and on the server. He currently works for a Northwestern Mutual building the next generation of illustration software.

- name: "Kathy Rodante"
  slug: "kathyrodante"
  headline: "Lead Software Engineer at Factory Quality"
  bio: |
    Kathy has over 6 years of programming with Elixir at Bleacher Report and The RealReal. She is currently supporting the team at Factored Quality with their full Elixir, Phoenix, and LiveView stack. She studied music and foreign language at university and is a self-taught software engineer. Outside of work she plays and develops video games and focuses on her family (husband, two toddlers, dog, and two cats!)

- name: "Kent McLeod"
  slug: "kentmcleod"
  headline: "Operating system engineer at Kry10 Limited"
  bio: |
    Kent is an operating-systems engineer specialized in formally verifiable trustworthy systems using seL4. His interests include systems engineering and how using different operating system architectures can help construct trustworthy applications.

    His work at Kry10 is focused on designing and developing the new Kry10 secure platform which includes a new device operating system, KOS, that leverages seL4 and the BEAM to make it easier to build and maintain embedded software that still needs to be secure and robust even if it’s connected to the internet.

    He previously worked at the Trustworthy Systems Research Group at CSIRO's Data61 where he helped oversee the technical development of seL4 as an OS engineer. He is currently a member of the seL4 Foundation’s technical steering committee.

- name: "Lee Barney"
  slug: "leebarney"
  headline: "Professor of Computer Science, Brigham Young University-Idaho"
  bio: |
    Twenty eight years ago, I entered the industry. In that time, I've been a senior software engineer, a junior programmer, a CEO, a product manager, an independent consultant, and pretty much everything in-between these. I have worked on mission-critical software for the semiconductor industry and began my own mobile-software startup company. Now I am a Professor of Computer Science and work to bring all those experiences into the classroom to help others succeeded in and love our industry.

- name: "Lucas C. Tavano"
  slug: "lucastavano"
  headline: "Elixir Software Engineer"
  bio: |
    I'm Brazilian, living in Curitiba, PR. Started my interest in development since I was just a child, playing with Arduino and Raspberry Pi.

    Started studying Computer Engineering at (Universidade Tecnológica Federal do Paraná) in 2015 and since then never left this path till today.

    I've been hired as a software engineer for the first time in 2017, starting my career in embedded systems with Python and Shell, then moving to PHP and Elixir as a back-end developer for 3 years, and at last, I've fully focused my career on being an Elixir back-end developer for the last year.

- name: "Mae Milano"
  slug: "maemilano"
  headline: "Inventing new ways to write correct distributed systems code"
  bio: |
    Mae Milano is an assistant professor at Princeton University working at the intersection of Programming Languages, Distributed Systems, and Databases. Her work has appeared at top-tier academic venues and has attracted the attention of the Swift language team. She is a recipient of the NDSEG Fellowship, has won several awards for her writing and service, and is a founding member of the Computing Connections Fellowship's selection committee (https://computingconnections.org/). https://languagesforsyste.ms

- name: "Marianne Bellotti"
  slug: "mariannebellotti"
  headline: "Author, Systems Geek, Relapsed Anthropologist"
  bio: |
    Marianne Bellotti is the author of books Kill It With Fire, Building Safety Critical Systems and Hiring Engineers, as well as a popular column on technology and system safety. She has built data infrastructure for the United Nations to help humanitarian organizations share crisis data and tackled some of the oldest and most complicated computer systems in the world as part of United States Digital Service. At Auth0 she ran Platform Services, a portfolio that included shared services, untrusted code execution, and developer tools. Currently she runs engineering teams at Rebellion Defense.

- name: "Matthew Pope"
  slug: "matthewpope"
  headline: "Software Engineer at Datometry"
  bio: |
    Matthew Pope is a Software Engineer working with Erlang in the database virtualization field. He has previous experience working in the video game industry, working on scaling Ejabberd as well as real-time match making. He wants to see the BEAM ecosystem thrive as more advanced tools and languages are created.

- name: "Milton Mazzarri"
  slug: "miltonmazzarri"
  headline: "Senior Software Engineer"
  bio: |
    https://milmazz.uno/about/

    Hello, my name is Milton Mazzarri (a.k.a. milmazz). I’m a Systems Engineer and an enthusiast of the Free/Libre Open Source Software philosophy.

    I left my homeland (Venezuela) more than a decade ago and began exploring other opportunities worldwide. I worked for some years in Mexico, and now I work in the United States of America, always doing what I like, software development.

    You can check my LinkedIn https://www.linkedin.com/in/milmazz and Github https://github.com/milmazz accounts if you want to know what I’m working on now.

    Among the things I like the most are reading books, mainly in the science-fiction, biography, history, or technical categories. I also enjoy sharing time with family and friends, playing tennis, going for a bike ride, playing football, or just running near home. But, of course, I’m also passionate about Computer Science and Programming Languages.

- name: "Mitchell Hanberg"
  slug: "mitchellhanberg"
  headline: "Senior Software Engineer at Simplebet"
  bio: |
    I am very passionate about using and teaching Elixir and have been doing so for the last 5 years.

    I am the author/maintainer of a few libraries: Wallaby, Temple, an Elixir plugin for Neovim and frequently write articles to my blog explaining interesting topics and showcasing my latest open source activities.

    I currently work at Simplebet as a Senior Software Engineer.

- name: "Mitsuhiro Osaki"
  slug: "mitsuhirosaki"
  headline: "Technical Supervisor"
  bio: |
    Mitsu is a technical supervisor at CityNet Inc. He has been developing a management system for small hydropower plants with Nerves. Also, he is working on a plan for the agricultural field with drones and wireless communication.

    He is a member of a research project named Beyone that has been developing a new platform for distributed computing, including his major topic Giocci within local 5G.

    He has enjoyed the Yosakoi Festival in Kochi, Japan as a choreographer of flag bearers.

    https://www.youtube.com/watch?v=4d_REO6WVH0

- name: "Parker Rueve"
  slug: "parkerrueve"
  headline: "Software Developer, Launch Scout"
  bio: |
    I'm a software developer living in Ohio.

    I'm interested in functional programming and user interfaces.

    I work at Launch Scout as a software developer, delivering custom software using Elixir, Phoenix, and LiveView.

    Before I started writing code professionally, I studied architecture and worked as a Vespa mechanic.

- name: "Rashmi Nagpal"
  slug: "rashminagpal"
  headline: "Machine Learning Engineer at Patchstack"
  bio: |
    Rashmi Nagpal is a Software Engineer with 3+ years of work experience. Also, She is a Research Affiliate at the University of San Francisco, CA, working in sociolinguistics. She is passionate about exploring FATE (Fairness, Accountability, Transparency, and Ethics) in NLP algorithms. She a graduate in Artificial Intelligence from the University of California Berkeley and Plaksha. She is a leader at Women Who Go, wherein she is actively involved in bridging the gender gap in Science, Technology, Engineering, and Mathematics (STEM) fields.

- name: "Ricardo Lanziano"
  slug: "ricardolanziano"
  headline: "Software developer at Erlang Solutions Americas"
  bio: |
    Systems engineer and computer programmer, currently working on Erlang based platforms. Used to tour across the country on a bike, nowadays he cosplays as a farmer. Experienced in BEAM based languages and different Lisp dialects. Has worked with software from embedded devices to redundant multicore HA servers.

- name: "Shintaro Hosoai"
  slug: "shintarohosoai"
  headline: "The University of Tokyo, Project Researcher, Embedded System/IoT"
  bio: |
    Shintaro Hosomi is a Project researcher at the University of Tokyo.

    His research is communication middleware for embedded systems and IoT, Software Engineering, System Modeling.

    He previously worked at a software company, where I was responsible for developing UML modeling tools and providing consulting on software engineering.

- name: "Sylvia Deal"
  slug: "sylviadeal"
  headline: "Seeking Meaningful Employment"
  bio: |
    Sylvia graduated from Brigham Young University-Idaho this past December. In addition to a love of functional programming and arguing about naming conventions they have a passion for audio, cooking, and any night of good games with friends.

    Sylvia has a spouse and two children, ages 3 years and 6 months. Their 3YO didn't have a "why" phase, he had a "but how does that work" phase. Sylvia likes to think that's a result of their influence.

- name: "Tom Collins"
  slug: "tomcollins"
  headline: "Co-founder of the Open Landscape Network"
  bio: |
    Tom and Emily are cofounders of the Open Landscape Network. Passionate about the intersection of environmentalism and technology, they saw the environmental sector was lagging in technical innovation, despite the climate and biodiversity crisis being some of the most significant challenges of our time.

    The organization now supports projects in multiple countries to develop and scale their efforts, while demonstrating the potential of cross-stakeholder collaboration.

- name: "Zeyu Zhang"
  slug: "zeyuzhang"
  headline: "Research Scientist at WhatsApp"
  bio: |
    I'm a research scientist currently working at WhatsApp Infrastructure, experienced on cluster scalability, transport protocols, container managements, server efficiency, as well as control planes.

    I'm also very interested in distributed protocols and algorithms, and like to solve hard technical problems.

- name: "Adrian Dunston"
  slug: "adriandunston"
  headline: "Director of Engineeering at Papa, Inc."
  bio: |
    Adrian P. Dunston has worked in companies of all sizes as a software developer, data architect, scrum master, manager, and briefly founder. He has presented on technical and interpersonal topics across the US, and he currently works as director of backend engineering at Papa, Inc. Adrian is passionate about neurodiversity, using computers to help people, growing a more inclusive tech industry, and storytelling. He wants to learn together how to grow the perfect software company.

- name: "Aidan Obley"
  slug: "aidanobley"
  headline: "they/them - Software Engineer @ Mechanical Orchard"
  bio: |
    Aidan is a passionate self-taught developer with a focus on developer and user joy. They currently work as a Staff Software Engineer at Mechanical Orchard safely modernizing legacy systems that run the world. Aidan loves to solve problems collaboratively, pair within and across disciplines, and test-drive code.

- name: "Charity Majors"
  slug: "charitymajors"
  headline: "Honeycomb.io"
  bio: |
    Charity is a co-founder and engineer at Honeycomb.io, a startup that blends the speed of time series with the raw power of rich events to give you interactive, iterative debugging of complex systems. She has worked at companies like Facebook, Parse, and Linden Lab, as a systems engineer and engineering manager, but always seems to end up responsible for the databases too. She loves free speech, free software and a nice peaty single malt.

- name: "Jeffrey Matthias"
  slug: "jeffreymatthias"
  headline: "Is there a test for that?"
  bio: |
    Jeffrey co-authored Testing Elixir with his friend and Elixir Core Team member Andrea Leopardi. He currently hangs his hat at Mechanical Orchard, where he is a Staff Engineer.

    Jeffrey deployed his first Elixir app to production over 9 years ago.

    He's passionate about creating things and supporting others doing so.

- name: "John Mandalakas"
  slug: "johnmandalakas"
  headline: "Software developer, aspiring farmer, and sustainability advocate"
  bio: |
    John Mandalakas is a software developer at NFI Industries, where he has been using elixir to build out an event-driven logistics system for the last six years.

    About a decade ago, he escaped a harrowing career in international finance by attending Dev Bootcamp, where an instructor once showed him Racket; he has been hooked on functional programming since that moment.

    When not coding in esoteric programming languages, he is spending time with his family, riding bikes, cooking, exploring forests, or pretending to farm in his backyard.

- name: "Kevin Barrett"
  slug: "kevinbarrett"
  headline: "Cofounder, screen.garden"
  bio: |
    Kevin Barrett is a writer and programmer in the Washington, DC area. Together with Sloane Perrault he founded screen.garden, a backend, website, and Obsidian plugin for turning Obsidian into a web-enabled, highly collaborative documents platform like Notion or Google Docs. He adores the BEAM and is convinced it is a superpower for companies and individuals alike.

- name: "Ray De Los Santos"
  slug: "raydelossantos"
  headline: "Lead Software Developer @ Ensemble Systems Inc"
  bio: |
    Ray is a full-stack lead web developer based in Vancouver. He began his programming journey in his teenage years and has since gained extensive experience working on various websites and web apps over the past decades. Ray is proficient in diverse frameworks such as Vue, React/NextJS, WordPress and others. Outside of work, he enjoys spending time with his family, photography, and tinkering with technology.

- name: "Saiph Savage"
  slug: "saiphsavage"
  headline: "UNAM & Northeastern University"
  bio: |
    Saiph Savage is an Assistant Professor at Northeastern University’s Khoury College of Computer Sciences, where she researches Human-Computer Interaction, AI, and Civic Technology. Recognized as one of MIT Technology Review's 35 Innovators under 35, she has received the Google Anita Borg Scholarship and is a fellow at the Center for Democracy & Technology. Her work has been featured in the BBC, Economist, and New York Times, and published in top venues like ACM CHI and CSCW, earning awards and honors. Dr. Savage has secured grants from the NSF, including the prestigious CAREER award, the United Nations, and industry partners. She collaborates with governments to integrate AI into public services. Her students have interned at companies like Facebook, Twitch, and Microsoft Research. Dr. Savage holds a bachelor's in Computer Engineering from the Universidad Nacional Autnoma de Mexico (UNAM) and a Ph.D. in Computer Science from UCSB. She has also worked at Microsoft, and Intel Labs.

- name: "Sloane Perrault"
  slug: "sloaneperrault"
  headline: "Cofounder, screen.garden"
  bio: |
    Sloane is a professional programmer and cofounder of screen.garden. She is using her love of functional programming and Elixir to bring real-time collaboration to Obsidian users everywhere. Outside of her professional life she enjoys cooking, singing, and running tabletop role-playing games for her friends and family.

- name: "Thiago Esteves"
  slug: "thiagoesteves"
  headline: "Software Architect"
  bio: |
    Thiago Esteves is a Software Engineer whose career has evolved from low-level systems with microcontrollers to embedded systems, safety applications, and high-level language applications such as web servers. With a strong hardware background, he brings a unique perspective to software solutions. With over 20 years of experience—more than six dedicated to Beam projects—Thiago has led and contributed to many successful projects. Now, he’s focused on spreading the word that the Beam is all you need!
