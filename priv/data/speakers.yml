  bio: |
    Sebastian Strollo has been an Erlang programmer since 1991 when he was introduced to Erlang by the language inventors at the Ericsson Computer Science Laboratory. Intrigued by the language and the lab he stayed on seeing Erlang through internal Ericsson use and then being part of making it open source in 1998.

      He has since been part of several successful Erlang startups, this year he joined a group of friends and Erlang veterans and founded Avassa.

      Sebastian serves on the board of the Erlang Ecosystem Foundation, where he is the secretary and the treasurer.

