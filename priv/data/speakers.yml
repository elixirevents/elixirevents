- name: "Hans Svensson"
  slug: "hanssvensson"
  headline: "Quviq AB - Quickcheck Expert"
  bio: "Hans Svensson has over 20 years of experience working with Erlang and the Erlang/OTP ecosystem. He holds a PhD in Computer Science, with a dissertation on Verification of Distributed Erlang Programs using Testing, Model Checking and Theorem Proving. For the past 15 years, he has worked at Quviq AB as a QuickCheck expert, helping teams apply property-based testing to real-world systems. His work spans a wide range of industries including telecom, automotive, cryptography, databases, cloud storage, and power grid systems. Hans focuses on using rigorous testing techniques to find subtle, security-relevant bugs early—before they become vulnerabilities in production systems."

- name: "Alex Kmoch"
  slug: "alexkmoch"
  headline: "Associate Professor in Geoinformatics"
  bio: "Alex is a Distributed Spatial Systems DevOps Tinkerer with many years of experience in geospatial data management and web- and cloud-based geoprocessing with a particular focus on land use, soils, hydrology, and water quality. His interests include open geospatial standards and web-services for location-based data sharing, modelling workflows, machine learning, and interactive geo-visualisation. Alex has been involved with web-based spatial data infrastructures for a long time as a developer, researcher and project leader. He is based at the Chair of Geoinformatics and Cartography at the Department of Geography of the University of Tartu."
