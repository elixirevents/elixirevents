# Kamal 2 deployment configuration for ElixirEvents
# See: https://kamal-deploy.org/docs/configuration/overview/

service: elixir-events
image: elixirevents/elixirevents

servers:
  web:
    hosts:
      - 62.238.14.62
    cmd: bin/server
    options:
      env:
        clear:
          PHX_SERVER: "true"
          OBAN_QUEUES: "none"
  workers:
    hosts:
      - 62.238.14.62
    cmd: bin/server
    options:
      env:
        clear:
          PHX_SERVER: "false"
          OBAN_QUEUES: "default:5,search:5"

proxy:
  ssl: true
  host: elixirevents.org
  app_port: 4000
  healthcheck:
    path: /up
    interval: 3
    timeout: 60

registry:
  server: ghcr.io
  username:
    - KAMAL_REGISTRY_USERNAME
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: arm64
  remote: ssh://root@62.238.14.62

env:
  clear:
    PHX_SERVER: "true"
    PHX_HOST: "elixirevents.org"
    PORT: "4000"
  secret:
    - SECRET_KEY_BASE
    - DATABASE_URL
    - RELEASE_COOKIE
    - RESEND_API_KEY
    - MAILER_FROM_EMAIL
    - MAILER_FROM_NAME
    - TYPESENSE_API_KEY
    - TYPESENSE_HOST
    - TYPESENSE_SEARCH_KEY
    - TYPESENSE_SEARCH_HOST
    - APPSIGNAL_PUSH_API_KEY

accessories:
  db:
    image: postgres:17
    host: 62.238.14.62
    env:
      clear:
        POSTGRES_USER: elixir_events
        POSTGRES_DB: elixir_events_prod
      secret:
        - POSTGRES_PASSWORD
    directories:
      - elixir-events-db-data:/var/lib/postgresql/data

ssh:
  user: root

aliases:
  console: app exec -i --reuse "/app/bin/elixir_events remote"
  shell: app exec -i --reuse "bash"
  logs: app logs -f
  errors: app logs --grep "error\\|exception"
  sync: app exec --reuse "/app/bin/elixir_events eval 'ElixirEvents.Release.full_sync()'"
  reindex: app exec --reuse "/app/bin/elixir_events rpc 'ElixirEvents.Search.reindex()'"
  db: accessory exec db -i --reuse "psql -U elixir_events elixir_events_prod"
  db-dump: accessory exec db --reuse "pg_dump -U elixir_events -Fc elixir_events_prod"
  restart: app boot
